shellcheck:
  disable:
    # SC2086 (unquoted variables) and SC2038 (find|xargs) are info/warning-level
    # shellcheck findings in benchmark.yml and release.yml. Address incrementally
    # rather than blocking every workflow PR with pre-existing style issues.
    - SC2086
    - SC2016  # single-quoted strings in heredocs are intentional (GitHub markdown)
    - SC2038  # find|xargs pattern — filenames are CI-controlled, not user input
