<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SteleKit — Try in Browser</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #1e1e1e; }
        #loading {
            position: fixed; inset: 0;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            background: #1e1e1e; color: #ccc;
            font-family: system-ui, sans-serif; z-index: 10;
        }
        #loading.hidden { display: none; }
    </style>
    <!-- Required: patches COOP/COEP headers for SharedArrayBuffer on GitHub Pages -->
    <script src="coi-serviceworker.min.js"></script>
</head>
<body>
    <div id="loading">
        <p style="font-size: 18px; margin-bottom: 8px;">Loading SteleKit…</p>
        <p style="font-size: 13px; color: #888; margin-bottom: 4px;">Requires Chrome 119+, Firefox 120+, or Safari 18.2+</p>
        <p style="font-size: 12px; color: #666;">This page may refresh once on first load — this is expected.</p>
    </div>
    <script src="kmp.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            setTimeout(function() {
                var loading = document.getElementById('loading');
                if (loading) loading.classList.add('hidden');
            }, 8000);
        });
    </script>
</body>
</html>
