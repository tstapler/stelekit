<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">

  <g id="icon">

    <!-- Shared plinth — drawn first so steles sit on top of it -->
    <rect x="60" y="444" width="394" height="22" rx="3" fill="#504945"/>

    <!-- Back-left stele: tall and narrow, slight leftward lean, hand-worn edges -->
    <polygon
      points="80,450 190,450 187,268 172,112 96,116 82,272"
      fill="#B8AFA0"
    />
    <rect x="104" y="162" width="68" height="13" fill="#6B6058"/>
    <rect x="106" y="189" width="50" height="13" fill="#6B6058"/>

    <!-- Back-right stele: shorter and chunkier, slight rightward lean -->
    <polygon
      points="298,450 434,450 437,280 420,168 312,164 295,286"
      fill="#B8AFA0"
    />
    <rect x="314" y="216" width="72" height="13" fill="#6B6058"/>
    <rect x="317" y="243" width="54" height="13" fill="#6B6058"/>
    <rect x="315" y="270" width="44" height="13" fill="#6B6058"/>

    <!-- Front stele: tallest, slightly asymmetric — wider base, narrows unevenly -->
    <polygon
      points="172,452 340,452 325,250 309,58 200,62 183,254"
      fill="#928374"
    />
    <!-- Carved inscription bands — group 1 -->
    <rect x="211" y="120" width="95" height="18" fill="#1D2021"/>
    <rect x="213" y="152" width="73" height="18" fill="#1D2021"/>
    <!-- paragraph gap -->
    <rect x="212" y="204" width="87" height="18" fill="#1D2021"/>
    <rect x="215" y="236" width="61" height="18" fill="#1D2021"/>

  </g>

</svg>
