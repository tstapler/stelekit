<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 512">

  <!-- Icon: Inscription Mark -->
  <g id="icon">

    <!-- Pillar body -->
    <rect x="140" y="106" width="60" height="320" rx="0" fill="#504945"/>

    <!-- Rounded cap at top -->
    <rect x="140" y="86" width="60" height="40" rx="12" fill="#504945"/>

    <!-- Inscription lines (extending right from pillar) -->
    <!-- Gap of 8px from pillar right edge (140+60=200, so lines start at 208) -->
    <!-- Lines spaced evenly within pillar height, centered vertically -->
    <!-- Pillar center ~256, spacing ~40px apart -->
    <rect x="208" y="230" width="80" height="12" rx="4" fill="#83A598"/>
    <rect x="208" y="270" width="60" height="12" rx="4" fill="#83A598"/>
    <rect x="208" y="310" width="45" height="12" rx="4" fill="#83A598"/>

  </g>

  <!-- Wordmark -->
  <g id="wordmark">
    <text
      x="340"
      y="282"
      font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
      font-size="96"
      font-weight="400"
      letter-spacing="-2"
      fill="#3C3836"
    >stelekit</text>
  </g>

</svg>
