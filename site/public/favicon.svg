<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Stone background -->
  <rect width="64" height="64" rx="10" fill="#282828"/>
  <!-- Plinth -->
  <rect x="7.5" y="55.5" width="49.25" height="2.75" rx="0.5" fill="#504945"/>
  <!-- Back-left stele -->
  <polygon points="10,56.25 23.75,56.25 23.375,33.5 21.5,14 12,14.5 10.25,34" fill="#B8AFA0"/>
  <!-- Back-right stele -->
  <polygon points="37.25,56.25 54.25,56.25 54.625,35 52.5,21 39,20.5 36.875,35.75" fill="#B8AFA0"/>
  <!-- Front stele (tallest, warmest stone) -->
  <polygon points="21.5,56.5 42.5,56.5 40.625,31.25 38.625,7.25 25,7.75 22.875,31.75" fill="#928374"/>
  <!-- Carved inscription bands on front stele -->
  <rect x="26.375" y="15" width="11.875" height="2.25" fill="#1D2021"/>
  <rect x="26.625" y="19" width="9.125" height="2.25" fill="#1D2021"/>
  <rect x="26.5" y="25.5" width="10.875" height="2.25" fill="#1D2021"/>
  <rect x="26.875" y="29.5" width="7.625" height="2.25" fill="#1D2021"/>
</svg>
