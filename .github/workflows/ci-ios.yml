name: CI (iOS)

# iOS jobs use macOS runners which cost 10× the minute multiplier.
# Run only on non-draft PRs to main, and only when relevant sources change.
on:
  pull_request:
    branches: [main, master]
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - 'kmp/src/commonMain/**'
      - 'kmp/src/iosMain/**'
      - 'kmp/src/iosTest/**'
      - 'kmp/build.gradle.kts'
      - 'settings.gradle.kts'
  push:
    branches: [main, master]
    paths:
      - 'kmp/src/commonMain/**'
      - 'kmp/src/iosMain/**'
      - 'kmp/src/iosTest/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ios-framework:
    name: iOS Framework Link Check
    runs-on: macos-latest
    if: github.event.pull_request.draft == false

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # Cache the Kotlin Native toolchain — critical on macOS (300-500 MB download otherwise)
      - uses: actions/cache@v4
        with:
          path: |
            ~/.konan/cache
            ~/.konan/dependencies
            ~/.konan/kotlin-native-prebuilt-*
          key: ${{ runner.os }}-konan-v1-${{ hashFiles('**/build.gradle.kts', '**/settings.gradle.kts') }}
          restore-keys: |
            ${{ runner.os }}-konan-v1-

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-home-cache-cleanup: true
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

      # Compile common metadata — validates commonMain type-correctness across all targets.
      # Workaround: Kotlin 2.3.x sets kotlinNativeBundleBuildService (via Property.set(Provider))
      # on all iOS-associated KotlinCompileCommon tasks. Gradle 8.8+ rejects this pattern for
      # build-service-typed properties, failing every iOS-specific compilation task. The common
      # metadata task does not have this association and compiles successfully.
      # Restore full iOS native compile once the Kotlin plugin is fixed upstream (KT-68400).
      - name: Compile common metadata
        run: |
          ./gradlew :kmp:compileCommonMainKotlinMetadata \
            --no-daemon \
            --build-cache
