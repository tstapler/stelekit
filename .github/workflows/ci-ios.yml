name: CI (iOS)

# iOS jobs use macOS runners which cost 10× the minute multiplier.
# Run only on non-draft PRs to main, and only when relevant sources change.
on:
  pull_request:
    branches: [main, master]
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - 'kmp/src/commonMain/**'
      - 'kmp/src/iosMain/**'
      - 'kmp/src/iosTest/**'
      - 'kmp/build.gradle.kts'
      - 'settings.gradle.kts'
  push:
    branches: [main, master]
    paths:
      - 'kmp/src/commonMain/**'
      - 'kmp/src/iosMain/**'
      - 'kmp/src/iosTest/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ios-framework:
    name: iOS Framework Link Check
    runs-on: macos-latest
    # Full iOS compilation is blocked by Gradle issue #17559 — KotlinNativeBundleBuildService
    # classloader mismatch in multi-project builds with AGP. Affects compileKotlinIos* tasks.
    # This job runs compileCommonMainKotlinMetadata instead, which is not affected.
    if: github.event.pull_request.draft == false

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # Cache the Kotlin Native toolchain — critical on macOS (300-500 MB download otherwise)
      - uses: actions/cache@v4
        with:
          path: |
            ~/.konan/cache
            ~/.konan/dependencies
            ~/.konan/kotlin-native-prebuilt-*
          key: ${{ runner.os }}-konan-v1-${{ hashFiles('**/build.gradle.kts', '**/settings.gradle.kts') }}
          restore-keys: |
            ${{ runner.os }}-konan-v1-

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-home-cache-cleanup: true
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

      # Best-effort iOS source validation. Restore full compileKotlinIosSimulatorArm64
      # once the Kotlin plugin upstream KT-68400 regression is fixed.
      #
      # kotlin.incremental.useClasspathSnapshot=false: Kotlin 2.3.x classpath-snapshot
      # incremental compilation produces an incomplete ABI view of Compose Multiplatform
      # 1.7.x klibs, causing androidx.compose.runtime.* symbols to be unresolvable for
      # files recompiled in an incremental pass. Disabling snapshots forces the full klib
      # onto the classpath for every incremental compilation unit. Has no effect on cache
      # hits (task output served directly) so steady-state build speed is unchanged.
      - name: Compile common metadata
        run: |
          ./gradlew :kmp:compileCommonMainKotlinMetadata \
            --no-daemon \
            --build-cache \
            -Pkotlin.incremental.useClasspathSnapshot=false
