name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v1.0.0)'
        required: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

# Resolve version: workflow_dispatch input takes precedence, falls back to the pushed tag name
env:
  VERSION: ${{ github.event.inputs.version || github.ref_name }}

jobs:
  # ── Android release APK ────────────────────────────────────────────────────
  android-release:
    name: Android Release APK
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-home-cache-cleanup: true
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

      - name: Decode keystore
        env:
          ANDROID_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE }}
        run: |
          if [ -n "$ANDROID_KEYSTORE" ]; then
            echo "$ANDROID_KEYSTORE" | base64 --decode > /tmp/release.keystore
            echo "ANDROID_KEYSTORE_PATH=/tmp/release.keystore" >> $GITHUB_ENV
          fi

      - name: Build and sign release APK
        env:
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          APP_VERSION="${{ env.VERSION }}"
          ./gradlew :androidApp:assembleRelease --no-daemon --build-cache \
            -PappVersion="${APP_VERSION#v}"

      - name: Rename APK with version
        run: |
          APK=$(find androidApp/build/outputs/apk/release -name "*.apk" | head -1)
          mv "$APK" "androidApp/build/outputs/apk/release/SteleKit-${{ env.VERSION }}-android.apk"

      - uses: actions/upload-artifact@v4
        with:
          name: android-release
          path: androidApp/build/outputs/apk/release/SteleKit-*.apk
          retention-days: 30

  # ── Desktop: Linux ─────────────────────────────────────────────────────────
  desktop-linux:
    name: Desktop (Linux)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-home-cache-cleanup: true
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

      - name: Package desktop distributable
        run: |
          APP_VERSION="${{ env.VERSION }}"
          ./gradlew :kmp:packageDistributionForCurrentOS --no-daemon --build-cache \
            -PappVersion="${APP_VERSION#v}"

      - name: Rename distributable with version
        run: |
          DIST=$(find kmp/build/compose/binaries/main -type f \( -name "*.deb" -o -name "*.rpm" -o -name "*.tar.gz" \) | head -1)
          EXT="${DIST##*.}"
          # Handle .tar.gz double extension
          [[ "$DIST" == *.tar.gz ]] && EXT="tar.gz"
          mv "$DIST" "kmp/build/compose/binaries/main/SteleKit-${{ env.VERSION }}-linux.$EXT"

      - uses: actions/upload-artifact@v4
        with:
          name: desktop-linux
          path: kmp/build/compose/binaries/main/SteleKit-*
          retention-days: 30

  # ── Desktop: macOS ─────────────────────────────────────────────────────────
  desktop-macos:
    name: Desktop (macOS)
    runs-on: macos-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-home-cache-cleanup: true
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

      - name: Package desktop distributable
        run: |
          APP_VERSION="${{ env.VERSION }}"
          ./gradlew :kmp:packageDistributionForCurrentOS --no-daemon --build-cache \
            -PappVersion="${APP_VERSION#v}"

      - name: Rename distributable with version
        run: |
          DIST=$(find kmp/build/compose/binaries/main -type f -name "*.dmg" | head -1)
          mv "$DIST" "kmp/build/compose/binaries/main/SteleKit-${{ env.VERSION }}-macos.dmg"

      - uses: actions/upload-artifact@v4
        with:
          name: desktop-macos
          path: kmp/build/compose/binaries/main/SteleKit-*.dmg
          retention-days: 30

  # ── Desktop: Windows ───────────────────────────────────────────────────────
  desktop-windows:
    name: Desktop (Windows)
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-home-cache-cleanup: true
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

      - name: Package desktop distributable
        run: |
          APP_VERSION="${{ env.VERSION }}"
          ./gradlew :kmp:packageDistributionForCurrentOS --no-daemon --build-cache \
            -PappVersion="${APP_VERSION#v}"

      - name: Rename distributable with version
        shell: bash
        run: |
          DIST=$(find kmp/build/compose/binaries/main -type f \( -name "*.msi" -o -name "*.exe" \) | head -1)
          EXT="${DIST##*.}"
          mv "$DIST" "kmp/build/compose/binaries/main/SteleKit-${{ env.VERSION }}-windows.$EXT"

      - uses: actions/upload-artifact@v4
        with:
          name: desktop-windows
          path: kmp/build/compose/binaries/main/SteleKit-*
          retention-days: 30

  # ── Create GitHub Release ──────────────────────────────────────────────────
  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [android-release, desktop-linux, desktop-macos, desktop-windows]
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'

    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: List release artifacts
        run: find release-artifacts -type f | sort

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: SteleKit ${{ env.VERSION }}
          files: release-artifacts/**
          generate_release_notes: true
          draft: true
          body: |
            ## SteleKit ${{ env.VERSION }}

            ### Downloads

            | Platform | File |
            |----------|------|
            | Android | `SteleKit-${{ env.VERSION }}-android.apk` |
            | Linux | `SteleKit-${{ env.VERSION }}-linux.*` |
            | macOS | `SteleKit-${{ env.VERSION }}-macos.dmg` |
            | Windows | `SteleKit-${{ env.VERSION }}-windows.*` |

            ### Android Installation
            Enable **Install from unknown sources** in Android settings before installing the APK.

            ---
            _Full changelog is auto-generated below._
