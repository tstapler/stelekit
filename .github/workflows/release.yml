name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v1.0.0)'
        required: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

# Resolve version: workflow_dispatch input takes precedence, falls back to the pushed tag name
env:
  VERSION: ${{ github.event.inputs.version || github.ref_name }}

jobs:
  # ── Android release APK ────────────────────────────────────────────────────
  android-release:
    name: Android Release APK
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-home-cache-cleanup: true
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

      - name: Decode keystore
        env:
          ANDROID_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE }}
        run: |
          if [ -n "$ANDROID_KEYSTORE" ]; then
            echo "$ANDROID_KEYSTORE" | base64 --decode > /tmp/release.keystore
            echo "ANDROID_KEYSTORE_PATH=/tmp/release.keystore" >> $GITHUB_ENV
          fi

      - name: Build and sign release APK
        env:
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          APP_VERSION="${{ env.VERSION }}"
          ./gradlew :androidApp:assembleRelease --no-daemon --build-cache \
            -PappVersion="${APP_VERSION#v}"

      - name: Rename APK with version
        run: |
          APK=$(find androidApp/build/outputs/apk/release -name "*.apk" | head -1)
          mv "$APK" "androidApp/build/outputs/apk/release/SteleKit-${{ env.VERSION }}-android.apk"

      - uses: actions/upload-artifact@v4
        with:
          name: android-release
          path: androidApp/build/outputs/apk/release/SteleKit-*.apk
          retention-days: 30

  # ── Desktop: Linux ─────────────────────────────────────────────────────────
  desktop-linux:
    name: Desktop (Linux)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-home-cache-cleanup: true
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

      - name: Install RPM toolchain
        run: sudo apt-get install -y rpm

      - name: Build DEB, RPM, and distributable
        run: |
          APP_VERSION="${{ env.VERSION }}"
          ./gradlew :kmp:packageDeb :kmp:packageRpm :kmp:createDistributable \
            --no-daemon --build-cache \
            -PappVersion="${APP_VERSION#v}"

      - name: Rename DEB and RPM with version
        run: |
          DEB=$(find kmp/build/compose/binaries/main/deb -name "*.deb" | head -1)
          RPM=$(find kmp/build/compose/binaries/main/rpm -name "*.rpm" | head -1)
          mv "$DEB" "kmp/build/compose/binaries/main/deb/SteleKit-${{ env.VERSION }}-linux.deb"
          mv "$RPM" "kmp/build/compose/binaries/main/rpm/SteleKit-${{ env.VERSION }}-linux.rpm"

      - name: Build AppImage
        run: |
          APP_VERSION="${{ env.VERSION }}"
          # Download appimagetool (use extract-and-run to avoid FUSE requirement in CI)
          wget -q "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage" \
            -O /tmp/appimagetool
          chmod +x /tmp/appimagetool

          # Set up AppDir from the Compose distributable
          APPDIR="$(pwd)/AppDir"
          mkdir -p "$APPDIR/usr"
          cp -r kmp/build/compose/binaries/main/app/stelekit/* "$APPDIR/usr/"

          # Icon — root (required by appimagetool) + hicolor path (for launcher integration)
          mkdir -p "$APPDIR/usr/share/icons/hicolor/256x256/apps"
          mkdir -p "$APPDIR/usr/share/applications"
          cp kmp/src/jvmMain/resources/icons/icon.png "$APPDIR/stelekit.png"
          cp kmp/src/jvmMain/resources/icons/icon.png "$APPDIR/usr/share/icons/hicolor/256x256/apps/stelekit.png"

          # Desktop entry — must be at root AND usr/share/applications for full integration
          printf '%s\n' \
            '[Desktop Entry]' \
            'Name=SteleKit' \
            'Exec=stelekit' \
            'Icon=stelekit' \
            'Type=Application' \
            'Categories=Office;' \
            'Comment=Markdown-based outliner and note-taking app' \
            > "$APPDIR/stelekit.desktop"
          cp "$APPDIR/stelekit.desktop" "$APPDIR/usr/share/applications/stelekit.desktop"

          # AppRun launcher
          printf '%s\n' \
            '#!/bin/bash' \
            'SELF=$(readlink -f "$0")' \
            'HERE="${SELF%/*}"' \
            'exec "$HERE/usr/bin/stelekit" "$@"' \
            > "$APPDIR/AppRun"
          chmod +x "$APPDIR/AppRun"

          # Build AppImage (extract-and-run avoids FUSE in CI; ARCH required when JRE contains multi-arch libs)
          APPIMAGE_EXTRACT_AND_RUN=1 ARCH=x86_64 /tmp/appimagetool "$APPDIR" \
            "kmp/build/compose/binaries/main/SteleKit-${APP_VERSION}-linux.AppImage"

      - uses: actions/upload-artifact@v4
        with:
          name: desktop-linux
          path: |
            kmp/build/compose/binaries/main/deb/SteleKit-*.deb
            kmp/build/compose/binaries/main/rpm/SteleKit-*.rpm
            kmp/build/compose/binaries/main/SteleKit-*-linux.AppImage
          retention-days: 30

  # ── Desktop: macOS ─────────────────────────────────────────────────────────
  desktop-macos:
    name: Desktop (macOS)
    runs-on: macos-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-home-cache-cleanup: true
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

      - name: Package desktop distributable
        run: |
          APP_VERSION="${{ env.VERSION }}"
          ./gradlew :kmp:packageDistributionForCurrentOS --no-daemon --build-cache \
            -PappVersion="${APP_VERSION#v}"

      - name: Rename distributable with version
        run: |
          DIST=$(find kmp/build/compose/binaries/main -type f -name "*.dmg" | head -1)
          mv "$DIST" "kmp/build/compose/binaries/main/SteleKit-${{ env.VERSION }}-macos.dmg"

      - uses: actions/upload-artifact@v4
        with:
          name: desktop-macos
          path: kmp/build/compose/binaries/main/SteleKit-*.dmg
          retention-days: 30

  # ── Desktop: Windows ───────────────────────────────────────────────────────
  desktop-windows:
    name: Desktop (Windows)
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-home-cache-cleanup: true
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

      - name: Package desktop distributable
        shell: bash
        run: |
          APP_VERSION="${{ env.VERSION }}"
          ./gradlew :kmp:packageDistributionForCurrentOS --no-daemon --build-cache \
            -PappVersion="${APP_VERSION#v}"

      - name: Rename distributable with version
        shell: bash
        run: |
          DIST=$(find kmp/build/compose/binaries/main -type f \( -name "*.msi" -o -name "*.exe" \) | head -1)
          EXT="${DIST##*.}"
          mv "$DIST" "kmp/build/compose/binaries/main/SteleKit-${{ env.VERSION }}-windows.$EXT"

      - uses: actions/upload-artifact@v4
        with:
          name: desktop-windows
          path: kmp/build/compose/binaries/main/SteleKit-*
          retention-days: 30

  # ── Create GitHub Release ──────────────────────────────────────────────────
  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [android-release, desktop-linux, desktop-macos, desktop-windows]
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: List release artifacts
        run: find release-artifacts -type f | sort

      - name: Update Homebrew formula SHA256s
        run: |
          LINUX_APPIMAGE=$(find release-artifacts -name "*.AppImage" | head -1)
          MACOS_DMG=$(find release-artifacts -name "*.dmg" | head -1)

          if [ -n "$LINUX_APPIMAGE" ]; then
            LINUX_SHA=$(sha256sum "$LINUX_APPIMAGE" | awk '{print $1}')
            sed -i "s/PLACEHOLDER_LINUX_SHA256/$LINUX_SHA/" HomebrewFormula/stelekit.rb
          fi
          if [ -n "$MACOS_DMG" ]; then
            MACOS_SHA=$(sha256sum "$MACOS_DMG" | awk '{print $1}')
            sed -i "s/PLACEHOLDER_MACOS_SHA256/$MACOS_SHA/" HomebrewFormula/stelekit.rb
          fi

          # Bump version in formula
          VER="${{ env.VERSION }}"
          sed -i "s/^  version \".*\"/  version \"${VER#v}\"/" HomebrewFormula/stelekit.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add HomebrewFormula/stelekit.rb
          git diff --cached --quiet || git commit -m "chore: update Homebrew formula for ${{ env.VERSION }}"
          git push origin HEAD:main

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: SteleKit ${{ env.VERSION }}
          files: release-artifacts/**
          generate_release_notes: true
          draft: false
          body: |
            ## SteleKit ${{ env.VERSION }}

            ### Downloads

            | Platform | File |
            |----------|------|
            | Android APK | `SteleKit-${{ env.VERSION }}-android.apk` |
            | Linux AppImage | `SteleKit-${{ env.VERSION }}-linux.AppImage` |
            | Linux DEB | `SteleKit-${{ env.VERSION }}-linux.deb` |
            | Linux RPM | `SteleKit-${{ env.VERSION }}-linux.rpm` |
            | macOS | `SteleKit-${{ env.VERSION }}-macos.dmg` |
            | Windows | `SteleKit-${{ env.VERSION }}-windows.msi` |

            ### Linux Installation
            **AppImage** (recommended — works on any distro including Arch/Manjaro):
            ```bash
            chmod +x SteleKit-${{ env.VERSION }}-linux.AppImage
            ./SteleKit-${{ env.VERSION }}-linux.AppImage
            ```
            **Homebrew** (macOS and Linux):
            ```bash
            brew tap tstapler/stelekit
            brew install stelekit
            ```
            **Debian/Ubuntu:** install the `.deb`
            **Fedora/openSUSE:** install the `.rpm`

            ### Android Installation
            Enable **Install from unknown sources** in Android settings before installing the APK.

            ---
            _Full changelog is auto-generated below._
