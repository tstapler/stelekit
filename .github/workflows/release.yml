name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v1.0.0) — skips Release Please, builds immediately'
        required: true

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ── Release Please ─────────────────────────────────────────────────────────
  # Runs on every push to main. Creates / updates the release PR.
  # When that PR is merged, Release Please publishes a GitHub Release and sets
  # release_created=true, which gates all downstream build jobs.
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # ── KMP JVM tests ──────────────────────────────────────────────────────────
  # Runs on every push to main (not gated on a release). Executes the fast
  # JVM test subset (excludes Roborazzi screenshot tests) with a virtual X
  # display so Compose UI tests can render headlessly. A failure here blocks
  # the resolve-version job and therefore all downstream build jobs.
  test-kmp:
    name: Test (KMP JVM)
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-home-cache-cleanup: true
          gradle-home-cache-strict-match: true
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

      - name: Install Xvfb (virtual display for Compose UI tests)
        run: sudo apt-get install -y xvfb

      - name: Run JVM tests (fast subset, no screenshots)
        run: |
          Xvfb :99 -screen 0 1280x720x24 &
          sleep 1
          DISPLAY=:99 LIBGL_ALWAYS_SOFTWARE=1 \
            ./gradlew :kmp:jvmTestFast --no-daemon --build-cache

  # ── Resolve version ────────────────────────────────────────────────────────
  # Normalises the version string from either Release Please or workflow_dispatch
  # so all build jobs can reference a single output.
  resolve-version:
    name: Resolve version
    runs-on: ubuntu-latest
    needs: [release-please, test-kmp]
    if: |
      always() &&
      (needs.test-kmp.result == 'success' || needs.test-kmp.result == 'skipped') && (
        (needs.release-please.result == 'success' && needs.release-please.outputs.release_created == 'true') ||
        (needs.release-please.result == 'skipped' && github.event_name == 'workflow_dispatch')
      )
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - id: ver
        run: |
          if [ -n "${{ needs.release-please.outputs.tag_name }}" ]; then
            echo "version=${{ needs.release-please.outputs.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          fi

  # ── Android release APK ────────────────────────────────────────────────────
  android-release:
    name: Android Release APK
    runs-on: ubuntu-latest
    needs: resolve-version
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-home-cache-cleanup: true
          gradle-home-cache-strict-match: true
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

      - name: Decode keystore
        env:
          ANDROID_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE }}
        run: |
          if [ -n "$ANDROID_KEYSTORE" ]; then
            echo "$ANDROID_KEYSTORE" | base64 --decode > /tmp/release.keystore
            echo "ANDROID_KEYSTORE_PATH=/tmp/release.keystore" >> $GITHUB_ENV
          fi

      - name: Build and sign release APK
        env:
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          APP_VERSION="${{ needs.resolve-version.outputs.version }}"
          ./gradlew :androidApp:assembleRelease --no-daemon --build-cache \
            -PappVersion="${APP_VERSION#v}"

      - name: Rename APK with version
        run: |
          APK=$(find androidApp/build/outputs/apk/release -name "*.apk" | head -1)
          mv "$APK" "androidApp/build/outputs/apk/release/SteleKit-${{ needs.resolve-version.outputs.version }}-android.apk"

      - uses: actions/upload-artifact@v4
        with:
          name: android-release
          path: androidApp/build/outputs/apk/release/SteleKit-*.apk
          retention-days: 30

  # ── Desktop: Linux ─────────────────────────────────────────────────────────
  desktop-linux:
    name: Desktop (Linux)
    runs-on: ubuntu-latest
    needs: resolve-version
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-home-cache-cleanup: true
          gradle-home-cache-strict-match: true
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

      - name: Install RPM toolchain
        run: sudo apt-get install -y rpm

      - name: Build DEB, RPM, and distributable
        run: |
          APP_VERSION="${{ needs.resolve-version.outputs.version }}"
          ./gradlew :kmp:packageDeb :kmp:packageRpm :kmp:createDistributable \
            --no-daemon --build-cache \
            -PappVersion="${APP_VERSION#v}"

      - name: Rename DEB and RPM with version
        run: |
          DEB=$(find kmp/build/compose/binaries/main/deb -name "*.deb" | head -1)
          RPM=$(find kmp/build/compose/binaries/main/rpm -name "*.rpm" | head -1)
          mv "$DEB" "kmp/build/compose/binaries/main/deb/SteleKit-${{ needs.resolve-version.outputs.version }}-linux.deb"
          mv "$RPM" "kmp/build/compose/binaries/main/rpm/SteleKit-${{ needs.resolve-version.outputs.version }}-linux.rpm"

      - name: Build AppImage
        run: |
          APP_VERSION="${{ needs.resolve-version.outputs.version }}"
          wget -q "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage" \
            -O /tmp/appimagetool
          chmod +x /tmp/appimagetool

          APPDIR="$(pwd)/AppDir"
          mkdir -p "$APPDIR/usr"
          cp -r kmp/build/compose/binaries/main/app/stelekit/* "$APPDIR/usr/"

          mkdir -p "$APPDIR/usr/share/icons/hicolor/256x256/apps"
          mkdir -p "$APPDIR/usr/share/applications"
          cp kmp/src/jvmMain/resources/icons/icon.png "$APPDIR/stelekit.png"
          cp kmp/src/jvmMain/resources/icons/icon.png "$APPDIR/usr/share/icons/hicolor/256x256/apps/stelekit.png"

          printf '%s\n' \
            '[Desktop Entry]' \
            'Name=SteleKit' \
            'Exec=stelekit' \
            'Icon=stelekit' \
            'Type=Application' \
            'Categories=Office;' \
            'Comment=Markdown-based outliner and note-taking app' \
            > "$APPDIR/stelekit.desktop"
          cp "$APPDIR/stelekit.desktop" "$APPDIR/usr/share/applications/stelekit.desktop"

          printf '%s\n' \
            '#!/bin/bash' \
            'SELF=$(readlink -f "$0")' \
            'HERE="${SELF%/*}"' \
            'exec "$HERE/usr/bin/stelekit" "$@"' \
            > "$APPDIR/AppRun"
          chmod +x "$APPDIR/AppRun"

          ARCH=$(uname -m)
          APPIMAGE_EXTRACT_AND_RUN=1 ARCH="$ARCH" /tmp/appimagetool "$APPDIR" \
            "kmp/build/compose/binaries/main/SteleKit-${APP_VERSION}-linux.AppImage"

      - name: Smoke-test AppImage startup
        run: |
          sudo apt-get install -y xvfb

          APPIMAGE=$(find kmp/build/compose/binaries/main -name "*.AppImage" | head -1)
          chmod +x "$APPIMAGE"

          Xvfb :99 -screen 0 1280x720x24 &
          XVFB_PID=$!
          sleep 2

          APPIMAGE_EXTRACT_AND_RUN=1 DISPLAY=:99 "$APPIMAGE" >/tmp/stelekit-smoke.log 2>&1 &
          APP_PID=$!

          sleep 20

          if kill -0 $APP_PID 2>/dev/null; then
            echo "Smoke test passed — app still running after 20s"
            kill $APP_PID 2>/dev/null || true
          else
            wait $APP_PID; EXIT_CODE=$?
            echo "Smoke test FAILED — app exited with code $EXIT_CODE"
            cat /tmp/stelekit-smoke.log || true
            kill $XVFB_PID 2>/dev/null || true
            exit 1
          fi
          kill $XVFB_PID 2>/dev/null || true

      - uses: actions/upload-artifact@v4
        with:
          name: desktop-linux
          path: |
            kmp/build/compose/binaries/main/deb/SteleKit-*.deb
            kmp/build/compose/binaries/main/rpm/SteleKit-*.rpm
            kmp/build/compose/binaries/main/SteleKit-*-linux.AppImage
          retention-days: 30

  # ── Desktop: macOS ─────────────────────────────────────────────────────────
  desktop-macos:
    name: Desktop (macOS)
    runs-on: macos-latest
    needs: resolve-version
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-home-cache-cleanup: true
          gradle-home-cache-strict-match: true
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

      - name: Package desktop distributable
        run: |
          APP_VERSION="${{ needs.resolve-version.outputs.version }}"
          ./gradlew :kmp:packageDistributionForCurrentOS --no-daemon --build-cache \
            -PappVersion="${APP_VERSION#v}"

      - name: Rename distributable with version
        run: |
          DIST=$(find kmp/build/compose/binaries/main -type f -name "*.dmg" | head -1)
          mv "$DIST" "kmp/build/compose/binaries/main/SteleKit-${{ needs.resolve-version.outputs.version }}-macos.dmg"

      - name: Smoke-test DMG startup
        run: |
          DMG=$(find kmp/build/compose/binaries/main -name "*-macos.dmg" | head -1)
          hdiutil attach "$DMG" -mountpoint /tmp/stelekit-smoke -nobrowse -quiet
          sudo xattr -rd com.apple.quarantine /tmp/stelekit-smoke/stelekit.app 2>/dev/null || true

          /tmp/stelekit-smoke/stelekit.app/Contents/MacOS/stelekit >/tmp/stelekit-smoke.log 2>&1 &
          APP_PID=$!

          sleep 20

          if kill -0 $APP_PID 2>/dev/null; then
            echo "Smoke test passed — app still running after 20s"
            kill $APP_PID 2>/dev/null || true
          else
            wait $APP_PID; EXIT_CODE=$?
            echo "Smoke test FAILED — app exited with code $EXIT_CODE"
            cat /tmp/stelekit-smoke.log || true
            hdiutil detach /tmp/stelekit-smoke -quiet || true
            exit 1
          fi
          hdiutil detach /tmp/stelekit-smoke -quiet || true

      - uses: actions/upload-artifact@v4
        with:
          name: desktop-macos
          path: kmp/build/compose/binaries/main/SteleKit-*.dmg
          retention-days: 30

  # ── Desktop: Windows ───────────────────────────────────────────────────────
  desktop-windows:
    name: Desktop (Windows)
    runs-on: windows-latest
    needs: resolve-version
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-home-cache-cleanup: true
          gradle-home-cache-strict-match: true
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

      - name: Package desktop distributable
        shell: bash
        run: |
          APP_VERSION="${{ needs.resolve-version.outputs.version }}"
          ./gradlew :kmp:packageDistributionForCurrentOS :kmp:createDistributable --no-daemon --build-cache \
            -PappVersion="${APP_VERSION#v}"

      - name: Smoke-test app startup
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Recurse "kmp\build\compose\binaries\main\app" -Filter "stelekit.exe" | Select-Object -First 1
          if (-not $exe) { Write-Error "stelekit.exe not found"; exit 1 }

          $proc = Start-Process -FilePath $exe.FullName -RedirectStandardError "$env:TEMP\stelekit-smoke.log" -PassThru
          Start-Sleep 20

          if (-not $proc.HasExited) {
            Write-Host "Smoke test passed — app still running after 20s"
            Stop-Process -Id $proc.Id -Force
          } else {
            Write-Host "Smoke test FAILED — app exited with code $($proc.ExitCode)"
            Get-Content "$env:TEMP\stelekit-smoke.log" -ErrorAction SilentlyContinue
            exit 1
          }

      - name: Rename distributable with version
        shell: bash
        run: |
          # Exclude the createDistributable app/ tree; only rename the installer produced by packageDistributionForCurrentOS
          DIST=$(find kmp/build/compose/binaries/main -type f \( -name "*.msi" -o -name "*.exe" \) ! -path "*/app/*" | head -1)
          EXT="${DIST##*.}"
          mv "$DIST" "kmp/build/compose/binaries/main/SteleKit-${{ needs.resolve-version.outputs.version }}-windows.$EXT"

      - uses: actions/upload-artifact@v4
        with:
          name: desktop-windows
          path: kmp/build/compose/binaries/main/SteleKit-*
          retention-days: 30

  # ── Create GitHub Release ──────────────────────────────────────────────────
  github-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [resolve-version, android-release, desktop-linux, desktop-macos, desktop-windows]
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: List release artifacts
        run: find release-artifacts -type f | sort

      - name: Update Homebrew formula SHA256s
        run: |
          LINUX_APPIMAGE=$(find release-artifacts -name "*.AppImage" | head -1)
          MACOS_DMG=$(find release-artifacts -name "*.dmg" | head -1)

          if [ -n "$LINUX_APPIMAGE" ]; then
            LINUX_SHA=$(sha256sum "$LINUX_APPIMAGE" | awk '{print $1}')
            sed -i "/on_linux/,/end/{s/sha256 \"[0-9a-f]\{64\}\"/sha256 \"$LINUX_SHA\"/; s/sha256 \"PLACEHOLDER_LINUX_SHA256\"/sha256 \"$LINUX_SHA\"/}" Formula/stelekit.rb
          fi
          if [ -n "$MACOS_DMG" ]; then
            MACOS_SHA=$(sha256sum "$MACOS_DMG" | awk '{print $1}')
            sed -i "/on_macos/,/end/{s/sha256 \"[0-9a-f]\{64\}\"/sha256 \"$MACOS_SHA\"/; s/sha256 \"PLACEHOLDER_MACOS_SHA256\"/sha256 \"$MACOS_SHA\"/}" Formula/stelekit.rb
          fi

          VER="${{ needs.resolve-version.outputs.version }}"
          sed -i "s/^  version \".*\"/  version \"${VER#v}\"/" Formula/stelekit.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/stelekit.rb
          git diff --cached --quiet || git commit -m "chore: update Homebrew formula for ${{ needs.resolve-version.outputs.version }}"
          git fetch origin main
          git rebase origin/main
          git push origin HEAD:main

      - name: Upload artifacts and prepend download table (Release Please release)
        if: github.event_name == 'push'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VER: ${{ needs.resolve-version.outputs.version }}
        run: |
          find release-artifacts -type f | xargs gh release upload "$VER" --clobber

          EXISTING=$(gh release view "$VER" --json body --jq '.body')
          NEW_BODY="## SteleKit ${VER}

          ### Downloads

          | Platform | File |
          |----------|------|
          | Android APK | \`SteleKit-${VER}-android.apk\` |
          | Linux AppImage | \`SteleKit-${VER}-linux.AppImage\` |
          | Linux DEB | \`SteleKit-${VER}-linux.deb\` |
          | Linux RPM | \`SteleKit-${VER}-linux.rpm\` |
          | macOS | \`SteleKit-${VER}-macos.dmg\` |
          | Windows | \`SteleKit-${VER}-windows.msi\` |

          ### Linux Installation
          **AppImage** (recommended — works on any distro including Arch/Manjaro):
          \`\`\`bash
          chmod +x SteleKit-${VER}-linux.AppImage
          ./SteleKit-${VER}-linux.AppImage
          \`\`\`
          **Homebrew** (macOS and Linux):
          \`\`\`bash
          brew tap tstapler/stelekit https://github.com/tstapler/stelekit
          brew install tstapler/stelekit/stelekit
          \`\`\`
          **Debian/Ubuntu:** install the \`.deb\`
          **Fedora/openSUSE:** install the \`.rpm\`

          ### Android Installation
          Enable **Install from unknown sources** in Android settings before installing the APK.

          ---

          ${EXISTING}"

          gh release edit "$VER" --notes "$NEW_BODY"

      - name: Create or update release (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve-version.outputs.version }}
          name: SteleKit ${{ needs.resolve-version.outputs.version }}
          files: release-artifacts/**
          generate_release_notes: true
          draft: false
          body: |
            ## SteleKit ${{ needs.resolve-version.outputs.version }}

            ### Downloads

            | Platform | File |
            |----------|------|
            | Android APK | `SteleKit-${{ needs.resolve-version.outputs.version }}-android.apk` |
            | Linux AppImage | `SteleKit-${{ needs.resolve-version.outputs.version }}-linux.AppImage` |
            | Linux DEB | `SteleKit-${{ needs.resolve-version.outputs.version }}-linux.deb` |
            | Linux RPM | `SteleKit-${{ needs.resolve-version.outputs.version }}-linux.rpm` |
            | macOS | `SteleKit-${{ needs.resolve-version.outputs.version }}-macos.dmg` |
            | Windows | `SteleKit-${{ needs.resolve-version.outputs.version }}-windows.msi` |

            ### Linux Installation
            **AppImage** (recommended — works on any distro including Arch/Manjaro):
            ```bash
            chmod +x SteleKit-${{ needs.resolve-version.outputs.version }}-linux.AppImage
            ./SteleKit-${{ needs.resolve-version.outputs.version }}-linux.AppImage
            ```
            **Homebrew** (macOS and Linux):
            ```bash
            brew tap tstapler/stelekit https://github.com/tstapler/stelekit
            brew install tstapler/stelekit/stelekit
            ```
            **Debian/Ubuntu:** install the `.deb`
            **Fedora/openSUSE:** install the `.rpm`

            ### Android Installation
            Enable **Install from unknown sources** in Android settings before installing the APK.

            ---
            _Full changelog is auto-generated below._
