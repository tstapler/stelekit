name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v1.0.0) — skips Release Please, builds immediately'
        required: true

permissions:
  contents: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Release Please ─────────────────────────────────────────────────────────
  # Runs on every push to main. Creates / updates the release PR.
  # When that PR is merged, Release Please publishes a GitHub Release and sets
  # release_created=true, which gates all downstream build jobs.
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        continue-on-error: true
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # ── Resolve version ────────────────────────────────────────────────────────
  # Normalises the version string from either Release Please or workflow_dispatch
  # so all build jobs can reference a single output.
  resolve-version:
    name: Resolve version
    runs-on: ubuntu-latest
    needs: [release-please]
    if: |
      always() && (
        (needs.release-please.result == 'success' && needs.release-please.outputs.release_created == 'true') ||
        (needs.release-please.result == 'skipped' && github.event_name == 'workflow_dispatch')
      )
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - id: ver
        run: |
          if [ -n "${{ needs.release-please.outputs.tag_name }}" ]; then
            echo "version=${{ needs.release-please.outputs.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          fi

  # ── CI status check ────────────────────────────────────────────────────────
  # Checks whether ci.yml already passed for this commit or its parent. The
  # parent check covers the normal Release Please path: RP commits only bump
  # version files, so the parent (the feature-merge commit) is the one that ran
  # CI. If either passed, the test-kmp safety gate below is skipped.
  check-ci-status:
    name: Check CI status
    runs-on: ubuntu-latest
    needs: [release-please]
    if: |
      always() && (
        (needs.release-please.result == 'success' && needs.release-please.outputs.release_created == 'true') ||
        (needs.release-please.result == 'skipped' && github.event_name == 'workflow_dispatch')
      )
    outputs:
      ci_passed: ${{ steps.check.outputs.ci_passed }}
    permissions:
      actions: read
    steps:
      - name: Check if ci.yml passed for this commit or its parent
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHA="${{ github.sha }}"
          # Release Please commits only bump version files; check parent too so
          # the feature-merge commit's CI run counts as validation.
          PARENT_SHA=$(gh api "/repos/${{ github.repository }}/commits/${SHA}" \
            --jq '.parents[0].sha // empty' 2>/dev/null || true)

          ci_passed_for() {
            local commit="$1"
            [ -z "$commit" ] && return 1
            local count
            count=$(gh run list \
              --repo "${{ github.repository }}" \
              --workflow ci.yml \
              --commit "$commit" \
              --status success \
              --limit 1 \
              --json databaseId \
              --jq 'length' 2>/dev/null || echo 0)
            [ "${count:-0}" -gt 0 ]
          }

          if ci_passed_for "$SHA" || ci_passed_for "$PARENT_SHA"; then
            echo "ci.yml passed for ${SHA} or parent — skipping redundant tests"
            echo "ci_passed=true" >> "$GITHUB_OUTPUT"
          else
            echo "No successful ci.yml run found — will run tests as safety gate"
            echo "ci_passed=false" >> "$GITHUB_OUTPUT"
          fi

  # ── KMP safety gate ────────────────────────────────────────────────────────
  # Runs JVM + Android unit tests only when ci.yml has NOT passed for this
  # commit or its parent (e.g. a direct push to main bypassed PR checks).
  # Skipped on the normal PR → merge path — adds zero release latency then.
  test-kmp:
    name: Test KMP (safety gate)
    runs-on: ubuntu-latest
    needs: [resolve-version, check-ci-status]
    if: |
      always() &&
      needs.resolve-version.result == 'success' &&
      (needs.check-ci-status.result == 'success' || needs.check-ci-status.result == 'failure') &&
      needs.check-ci-status.outputs.ci_passed != 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v4
        with:
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}
      - name: Install Xvfb
        run: sudo apt-get install -y xvfb
      - name: Run JVM and Android unit tests
        run: xvfb-run --auto-servernum ./gradlew jvmTest testDebugUnitTest --no-daemon --build-cache

  # ── Android release APK ────────────────────────────────────────────────────
  android-release:
    name: Android Release APK
    runs-on: ubuntu-latest
    needs: [resolve-version, test-kmp]
    if: ${{ always() && needs.resolve-version.result == 'success' && (needs.test-kmp.result == 'success' || needs.test-kmp.result == 'skipped') }}
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v4
        with:
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

      - name: Decode keystore
        env:
          ANDROID_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE }}
        run: |
          if [ -n "$ANDROID_KEYSTORE" ]; then
            echo "$ANDROID_KEYSTORE" | base64 --decode > /tmp/release.keystore
            echo "ANDROID_KEYSTORE_PATH=/tmp/release.keystore" >> $GITHUB_ENV
          fi

      - name: Build and sign release APK
        env:
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          # lintVitalAnalyzeRelease and D8 desugar exhaust the 512m default Metaspace.
          # Override gradle.properties jvmargs: reduce heap pre-alloc (no warm daemon),
          # double Metaspace to 1g to prevent intermittent OOM on CI runners.
          GRADLE_OPTS: >-
            -Xms2g -Xmx4g
            -XX:MaxMetaspaceSize=1g
            -XX:ReservedCodeCacheSize=512m
            -Dfile.encoding=UTF-8
        run: |
          APP_VERSION="${{ needs.resolve-version.outputs.version }}"
          ./gradlew :androidApp:assembleRelease --no-daemon --build-cache \
            -PappVersion="${APP_VERSION#v}"

      - name: Rename APK with version
        run: |
          APK=$(find androidApp/build/outputs/apk/release -name "*.apk" | head -1)
          mv "$APK" "androidApp/build/outputs/apk/release/SteleKit-${{ needs.resolve-version.outputs.version }}-android.apk"

      - uses: actions/upload-artifact@v4
        with:
          name: android-release
          path: androidApp/build/outputs/apk/release/SteleKit-*.apk
          retention-days: 30

  # ── Desktop: Linux ─────────────────────────────────────────────────────────
  desktop-linux:
    name: Desktop (Linux)
    runs-on: ubuntu-latest
    needs: [resolve-version, test-kmp]
    if: ${{ always() && needs.resolve-version.result == 'success' && (needs.test-kmp.result == 'success' || needs.test-kmp.result == 'skipped') }}
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v4
        with:
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

      - name: Install RPM toolchain
        run: sudo apt-get install -y rpm

      # KNOWN GAP: the .deb/.rpm builds below invoke jpackage independently of
      # the AppImage build and hit the same classpath-buffer-overflow bug
      # patched (only in the AppImage's staged .cfg) further down in this job.
      # Not fixed here — .deb/.rpm installs still crash until this is addressed separately.
      - name: Build DEB, RPM, and distributable
        run: |
          APP_VERSION="${{ needs.resolve-version.outputs.version }}"
          ./gradlew :kmp:packageDeb :kmp:packageRpm :kmp:createDistributable \
            --no-daemon --build-cache \
            -PappVersion="${APP_VERSION#v}"

      - name: Rename DEB and RPM with version
        run: |
          DEB=$(find kmp/build/compose/binaries/main/deb -name "*.deb" | head -1)
          RPM=$(find kmp/build/compose/binaries/main/rpm -name "*.rpm" | head -1)
          mv "$DEB" "kmp/build/compose/binaries/main/deb/SteleKit-${{ needs.resolve-version.outputs.version }}-linux.deb"
          mv "$RPM" "kmp/build/compose/binaries/main/rpm/SteleKit-${{ needs.resolve-version.outputs.version }}-linux.rpm"

      - name: Cache appimagetool
        id: cache-appimagetool
        uses: actions/cache@v4
        with:
          path: ~/.local/bin/appimagetool
          key: appimagetool-continuous-x86_64

      - name: Download appimagetool
        if: steps.cache-appimagetool.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.local/bin
          wget -q "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage" \
            -O ~/.local/bin/appimagetool
          chmod +x ~/.local/bin/appimagetool

      - name: Build AppImage
        run: |
          APP_VERSION="${{ needs.resolve-version.outputs.version }}"
          APPIMAGE_TOOL=~/.local/bin/appimagetool

          APPDIR="$(pwd)/AppDir"
          mkdir -p "$APPDIR/usr"
          cp -r kmp/build/compose/binaries/main/app/stelekit/* "$APPDIR/usr/"

          # jpackage lists every dependency jar as its own `app.classpath=` line in
          # the launcher .cfg file. With ~130 jars in this app's classpath, the
          # native launcher's fixed-size arg buffer overflows while building the
          # JLI_Launch argv, silently truncating it and corrupting adjacent memory
          # (including the env-var table) — the launcher then segfaults inside
          # glibc's setenv(). Collapsing to one wildcard entry avoids the overflow;
          # `$APPDIR/*` is expanded by the JVM's own classpath wildcard handling.
          CFG="$APPDIR/usr/lib/app/stelekit.cfg"
          awk '
            /^app\.classpath=/ && !done { print "app.classpath=$APPDIR/*"; done=1; next }
            /^app\.classpath=/ { next }
            { print }
          ' "$CFG" > "$CFG.tmp" && mv "$CFG.tmp" "$CFG"

          # Deterministic regression guard: this must always collapse to exactly one
          # entry. Relying only on the runtime smoke test below is not enough — the
          # launcher's buffer-overflow corruption is heap-layout dependent, so it can
          # silently pass on one glibc/allocator and still segfault on another.
          CLASSPATH_LINES=$(grep -c '^app\.classpath=' "$CFG")
          if [ "$CLASSPATH_LINES" -ne 1 ]; then
            echo "::error::Expected exactly 1 app.classpath= line in $CFG after collapsing to a wildcard, found $CLASSPATH_LINES"
            exit 1
          fi

          mkdir -p "$APPDIR/usr/share/icons/hicolor/256x256/apps"
          mkdir -p "$APPDIR/usr/share/applications"
          cp kmp/src/jvmMain/resources/icons/icon.png "$APPDIR/stelekit.png"
          cp kmp/src/jvmMain/resources/icons/icon.png "$APPDIR/usr/share/icons/hicolor/256x256/apps/stelekit.png"

          printf '%s\n' \
            '[Desktop Entry]' \
            'Name=SteleKit' \
            'Exec=stelekit' \
            'Icon=stelekit' \
            'Type=Application' \
            'Categories=Office;' \
            'Comment=Markdown-based outliner and note-taking app' \
            > "$APPDIR/stelekit.desktop"
          cp "$APPDIR/stelekit.desktop" "$APPDIR/usr/share/applications/stelekit.desktop"

          printf '%s\n' \
            '#!/bin/bash' \
            'SELF=$(readlink -f "$0")' \
            'HERE="${SELF%/*}"' \
            'exec "$HERE/usr/bin/stelekit" "$@"' \
            > "$APPDIR/AppRun"
          chmod +x "$APPDIR/AppRun"

          ARCH=$(uname -m)
          APPIMAGE_EXTRACT_AND_RUN=1 ARCH="$ARCH" "$APPIMAGE_TOOL" "$APPDIR" \
            "kmp/build/compose/binaries/main/SteleKit-${APP_VERSION}-linux.AppImage"

      - name: Smoke-test AppImage startup
        run: |
          sudo apt-get install -y xvfb

          APPIMAGE=$(find kmp/build/compose/binaries/main -name "*.AppImage" | head -1)
          chmod +x "$APPIMAGE"

          Xvfb :99 -screen 0 1280x720x24 &
          XVFB_PID=$!
          sleep 2

          APPIMAGE_EXTRACT_AND_RUN=1 DISPLAY=:99 "$APPIMAGE" >/tmp/stelekit-smoke.log 2>&1 &
          APP_PID=$!

          sleep 2
          TIMEOUT=30
          ELAPSED=2
          PASSED=false
          while [ $ELAPSED -lt $TIMEOUT ]; do
            if kill -0 $APP_PID 2>/dev/null; then
              PASSED=true
              break
            fi
            sleep 2
            ELAPSED=$((ELAPSED + 2))
          done

          if [ "$PASSED" = "true" ]; then
            echo "Smoke test passed — app still running after ${ELAPSED}s"
            kill $APP_PID 2>/dev/null || true
          else
            wait $APP_PID; EXIT_CODE=$?
            if [ "$EXIT_CODE" -eq 139 ] || [ "$EXIT_CODE" -eq 127 ]; then
              echo "::error::Smoke test FAILED — exit $EXIT_CODE within ${TIMEOUT}s. This matches the jpackage classpath-buffer-overflow bug (JvmLauncherLib.c corrupts its argv/env buffer building a huge -classpath; depending on heap layout it either segfaults in setenv (139) or fails an internal re-exec with ENOENT (127)) — check that the app.classpath wildcard collapse above actually applied."
            else
              echo "Smoke test FAILED — app exited within ${TIMEOUT}s (code $EXIT_CODE)"
            fi
            cat /tmp/stelekit-smoke.log || true
            kill $XVFB_PID 2>/dev/null || true
            exit 1
          fi
          kill $XVFB_PID 2>/dev/null || true

      - uses: actions/upload-artifact@v4
        with:
          name: desktop-linux
          path: |
            kmp/build/compose/binaries/main/deb/SteleKit-*.deb
            kmp/build/compose/binaries/main/rpm/SteleKit-*.rpm
            kmp/build/compose/binaries/main/SteleKit-*-linux.AppImage
          retention-days: 30

  # ── Desktop: macOS ─────────────────────────────────────────────────────────
  desktop-macos:
    name: Desktop (macOS)
    runs-on: macos-latest
    needs: [resolve-version, test-kmp]
    if: ${{ always() && needs.resolve-version.result == 'success' && (needs.test-kmp.result == 'success' || needs.test-kmp.result == 'skipped') }}
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v4
        with:
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

      - name: Install Bazelisk
        run: brew install bazelisk

      - name: Generate icon.icns
        run: |
          bazel build //kmp/src/jvmMain/resources/icons:icon_icns
          cp bazel-bin/kmp/src/jvmMain/resources/icons/icon.icns \
             kmp/src/jvmMain/resources/icons/icon.icns

      - name: Package desktop distributable
        run: |
          APP_VERSION="${{ needs.resolve-version.outputs.version }}"
          ./gradlew :kmp:createDistributable --no-daemon --build-cache \
            -PappVersion="${APP_VERSION#v}"

      - name: Ad-hoc codesign app bundle
        run: |
          APP=$(find kmp/build/compose/binaries/main/app -name "*.app" -maxdepth 1 | head -1)
          codesign --sign - --force --deep "$APP"

      - name: Package DMG
        run: |
          APP_VERSION="${{ needs.resolve-version.outputs.version }}"
          ./gradlew :kmp:packageDmg --no-daemon --build-cache \
            -PappVersion="${APP_VERSION#v}"

      - name: Rename distributable with version
        run: |
          DIST=$(find kmp/build/compose/binaries/main -type f -name "*.dmg" | head -1)
          mv "$DIST" "kmp/build/compose/binaries/main/SteleKit-${{ needs.resolve-version.outputs.version }}-macos.dmg"

      - name: Smoke-test DMG startup
        run: |
          DMG=$(find kmp/build/compose/binaries/main -name "*-macos.dmg" | head -1)
          hdiutil attach "$DMG" -mountpoint /tmp/stelekit-smoke -nobrowse -quiet
          sudo xattr -rd com.apple.quarantine /tmp/stelekit-smoke/stelekit.app 2>/dev/null || true

          /tmp/stelekit-smoke/stelekit.app/Contents/MacOS/stelekit >/tmp/stelekit-smoke.log 2>&1 &
          APP_PID=$!

          sleep 2
          TIMEOUT=30
          ELAPSED=2
          PASSED=false
          while [ $ELAPSED -lt $TIMEOUT ]; do
            if kill -0 $APP_PID 2>/dev/null; then
              PASSED=true
              break
            fi
            sleep 2
            ELAPSED=$((ELAPSED + 2))
          done

          if [ "$PASSED" = "true" ]; then
            echo "Smoke test passed — app still running after ${ELAPSED}s"
            kill $APP_PID 2>/dev/null || true
          else
            wait $APP_PID; EXIT_CODE=$?
            echo "Smoke test FAILED — app exited within ${TIMEOUT}s (code $EXIT_CODE)"
            cat /tmp/stelekit-smoke.log || true
            hdiutil detach /tmp/stelekit-smoke -quiet || true
            exit 1
          fi
          hdiutil detach /tmp/stelekit-smoke -quiet || true

      - uses: actions/upload-artifact@v4
        with:
          name: desktop-macos
          path: kmp/build/compose/binaries/main/SteleKit-*.dmg
          retention-days: 30

  # ── Desktop: Windows ───────────────────────────────────────────────────────
  desktop-windows:
    name: Desktop (Windows)
    runs-on: windows-latest
    needs: [resolve-version, test-kmp]
    if: ${{ always() && needs.resolve-version.result == 'success' && (needs.test-kmp.result == 'success' || needs.test-kmp.result == 'skipped') }}
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v4
        with:
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

      - name: Package desktop distributable
        shell: bash
        run: |
          APP_VERSION="${{ needs.resolve-version.outputs.version }}"
          ./gradlew :kmp:packageDistributionForCurrentOS :kmp:createDistributable --no-daemon --build-cache \
            -PappVersion="${APP_VERSION#v}"

      - name: Smoke-test app startup
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Recurse "kmp\build\compose\binaries\main\app" -Filter "stelekit.exe" | Select-Object -First 1
          if (-not $exe) { Write-Error "stelekit.exe not found"; exit 1 }

          $proc = Start-Process -FilePath $exe.FullName -RedirectStandardError "$env:TEMP\stelekit-smoke.log" -PassThru
          Start-Sleep 2
          $timeout = 30
          $elapsed = 2
          $passed = $false
          while ($elapsed -lt $timeout) {
            if (-not $proc.HasExited) {
              $passed = $true
              break
            }
            Start-Sleep 2
            $elapsed += 2
          }

          if ($passed) {
            Write-Host "Smoke test passed — app still running after ${elapsed}s"
            Stop-Process -Id $proc.Id -Force
          } else {
            Write-Host "Smoke test FAILED — app exited within ${timeout}s (code $($proc.ExitCode))"
            Get-Content "$env:TEMP\stelekit-smoke.log" -ErrorAction SilentlyContinue
            exit 1
          }

      - name: Rename distributable with version
        shell: bash
        run: |
          # Exclude the createDistributable app/ tree; only rename the installer produced by packageDistributionForCurrentOS
          DIST=$(find kmp/build/compose/binaries/main -type f \( -name "*.msi" -o -name "*.exe" \) ! -path "*/app/*" | head -1)
          EXT="${DIST##*.}"
          mv "$DIST" "kmp/build/compose/binaries/main/SteleKit-${{ needs.resolve-version.outputs.version }}-windows.$EXT"

      - uses: actions/upload-artifact@v4
        with:
          name: desktop-windows
          path: kmp/build/compose/binaries/main/SteleKit-*
          retention-days: 30

  # ── Create GitHub Release ──────────────────────────────────────────────────
  github-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [resolve-version, android-release, desktop-linux, desktop-macos, desktop-windows]
    if: ${{ always() && needs.resolve-version.result == 'success' && needs.android-release.result == 'success' && needs.desktop-linux.result == 'success' && needs.desktop-macos.result == 'success' && needs.desktop-windows.result == 'success' }}
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: List release artifacts
        run: find release-artifacts -type f | sort

      - name: Upload artifacts and prepend download table (Release Please release)
        if: github.event_name == 'push'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VER: ${{ needs.resolve-version.outputs.version }}
        run: |
          find release-artifacts -type f | xargs gh release upload "$VER" --clobber

          EXISTING=$(gh release view "$VER" --json body --jq '.body')
          NEW_BODY="## SteleKit ${VER}

          ### Downloads

          | Platform | File |
          |----------|------|
          | Android APK | \`SteleKit-${VER}-android.apk\` |
          | Linux AppImage | \`SteleKit-${VER}-linux.AppImage\` |
          | Linux DEB | \`SteleKit-${VER}-linux.deb\` |
          | Linux RPM | \`SteleKit-${VER}-linux.rpm\` |
          | macOS | \`SteleKit-${VER}-macos.dmg\` |
          | Windows | \`SteleKit-${VER}-windows.msi\` |

          ### Linux Installation
          **AppImage** (recommended — works on any distro including Arch/Manjaro):
          \`\`\`bash
          chmod +x SteleKit-${VER}-linux.AppImage
          ./SteleKit-${VER}-linux.AppImage
          \`\`\`
          **Homebrew** (macOS and Linux):
          \`\`\`bash
          brew tap tstapler/stelekit https://github.com/tstapler/stelekit
          brew install tstapler/stelekit/stelekit
          \`\`\`
          **Debian/Ubuntu:** install the \`.deb\`
          **Fedora/openSUSE:** install the \`.rpm\`

          ### Android Installation
          Enable **Install from unknown sources** in Android settings before installing the APK.

          ---

          ${EXISTING}"

          gh release edit "$VER" --notes "$NEW_BODY"

          # Publish: all artifacts are attached — promote from draft to live release
          gh release edit "$VER" --draft=false

      # NOTE: fdroid.yml cannot be triggered via 'release: published' here because
      # GITHUB_TOKEN-triggered events do not fire other workflows. It is called
      # directly via the 'update-fdroid-pages' job below instead.

      - name: Create or update release (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve-version.outputs.version }}
          name: SteleKit ${{ needs.resolve-version.outputs.version }}
          files: release-artifacts/**
          generate_release_notes: true
          draft: false
          body: |
            ## SteleKit ${{ needs.resolve-version.outputs.version }}

            ### Downloads

            | Platform | File |
            |----------|------|
            | Android APK | `SteleKit-${{ needs.resolve-version.outputs.version }}-android.apk` |
            | Linux AppImage | `SteleKit-${{ needs.resolve-version.outputs.version }}-linux.AppImage` |
            | Linux DEB | `SteleKit-${{ needs.resolve-version.outputs.version }}-linux.deb` |
            | Linux RPM | `SteleKit-${{ needs.resolve-version.outputs.version }}-linux.rpm` |
            | macOS | `SteleKit-${{ needs.resolve-version.outputs.version }}-macos.dmg` |
            | Windows | `SteleKit-${{ needs.resolve-version.outputs.version }}-windows.msi` |

            ### Linux Installation
            **AppImage** (recommended — works on any distro including Arch/Manjaro):
            ```bash
            chmod +x SteleKit-${{ needs.resolve-version.outputs.version }}-linux.AppImage
            ./SteleKit-${{ needs.resolve-version.outputs.version }}-linux.AppImage
            ```
            **Homebrew** (macOS and Linux):
