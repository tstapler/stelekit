  # ── Homebrew formula update ────────────────────────────────────────────────
  # Runs after artifact upload. Its own concurrency group (homebrew-formula)
  # ensures concurrent release builds queue here instead of racing on a push.
  # A version guard skips the update when an older release is being backfilled
  # (e.g. re-running v0.34.0 must not overwrite the v0.38.1 formula already in
  # main). update-fdroid and deploy-pages do NOT wait on this job.
  update-homebrew:
    name: Update Homebrew Formula
    runs-on: ubuntu-latest
    needs: [resolve-version, github-release]
    if: ${{ always() && needs.resolve-version.result == 'success' && needs.github-release.result == 'success' }}
    concurrency:
      group: homebrew-formula
      cancel-in-progress: false
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Update Homebrew formula SHA256s
        env:
          VER: ${{ needs.resolve-version.outputs.version }}
        run: |
          # Fetch origin/main so we can read the formula version currently there.
          # With the concurrency queue, only one update-homebrew job runs at a time,
          # so by the time we start the formula reflects all earlier queued updates.
          git fetch origin main

          CURRENT_VER=$(git show origin/main:Formula/stelekit.rb \
            | grep -m1 'version "' | grep -oP '[0-9]+\.[0-9]+\.[0-9]+')
          BUILD_VER="${VER#v}"

          # Skip if formula already points to a newer release. This prevents a
          # backfill build (v0.34.0) from overwriting a formula already updated
          # to v0.38.1 by a normal release run.
          if ! python3 -c "
          a = tuple(map(int, '$CURRENT_VER'.split('.')))
          b = tuple(map(int, '$BUILD_VER'.split('.')))
          exit(0 if b >= a else 1)
          "; then
            echo "Formula is already at $CURRENT_VER (newer than $BUILD_VER) — skipping"
            exit 0
          fi

          echo "Updating formula: $CURRENT_VER → $BUILD_VER"

          LINUX_APPIMAGE=$(find release-artifacts -name "*.AppImage" | head -1)
          MACOS_DMG=$(find release-artifacts -name "*.dmg" | head -1)

          if [ -n "$LINUX_APPIMAGE" ]; then
            LINUX_SHA=$(sha256sum "$LINUX_APPIMAGE" | awk '{print $1}')
            sed -i "/on_linux/,/end/{s/sha256 \"[0-9a-f]\{64\}\"/sha256 \"$LINUX_SHA\"/; s/sha256 \"PLACEHOLDER_LINUX_SHA256\"/sha256 \"$LINUX_SHA\"/}" Formula/stelekit.rb
          fi
          if [ -n "$MACOS_DMG" ]; then
            MACOS_SHA=$(sha256sum "$MACOS_DMG" | awk '{print $1}')
            sed -i "/on_macos/,/end/{s/sha256 \"[0-9a-f]\{64\}\"/sha256 \"$MACOS_SHA\"/; s/sha256 \"PLACEHOLDER_MACOS_SHA256\"/sha256 \"$MACOS_SHA\"/}" Formula/stelekit.rb
            sed -i "s/sha256 \"[0-9a-f]\{64\}\"/sha256 \"$MACOS_SHA\"/" Casks/stelekit.rb
          fi

          sed -i "s/^  version \".*\"/  version \"$BUILD_VER\"/" Formula/stelekit.rb
          sed -i "s/^  version \".*\"/  version \"$BUILD_VER\"/" Casks/stelekit.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/stelekit.rb Casks/stelekit.rb
          git diff --cached --quiet || git commit -m "chore: update Homebrew formula for $VER"
          git rebase origin/main
          git push origin HEAD:main

  # ── F-Droid index build ────────────────────────────────────────────────────
  # Called directly after github-release because GITHUB_TOKEN-triggered events
  # (gh release edit --draft=false) cannot fire the release: [published] trigger
  # in fdroid.yml — GitHub blocks cross-workflow events from GITHUB_TOKEN.
  #
  # fdroid.yml uploads the fdroid-content artifact; deploy-pages (below) downloads
  # it and assembles+deploys the site in a single pass — no duplicate site build.
  # update-homebrew runs in parallel — site deploy does not wait on Homebrew.
  update-fdroid:
    name: Build F-Droid Index
    needs: [github-release]
    if: ${{ always() && needs.github-release.result == 'success' }}
    uses: ./.github/workflows/fdroid.yml
    permissions:
      contents: read
      actions: read
    secrets: inherit

  # ── Site deploy (with fresh F-Droid index) ────────────────────────────────
  # Runs after fdroid.yml so pages.yml finds the fdroid-content artifact in the
  # current run (reusable workflows share the parent run's artifact space).
  deploy-pages:
    name: Deploy Site
    needs: [update-fdroid]
    if: ${{ always() && needs.update-fdroid.result == 'success' }}
    uses: ./.github/workflows/pages.yml
    with:
      force_demo_rebuild: true
    permissions:
      contents: read
      pages: write
      id-token: write
      actions: read
    secrets: inherit
