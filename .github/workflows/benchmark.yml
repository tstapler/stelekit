name: Benchmark

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  benchmark:
    name: Load Benchmark
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-home-cache-cleanup: true
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

      - name: Install tools
        run: |
          wget -q -O ap.tar.gz https://github.com/async-profiler/async-profiler/releases/download/v4.4/async-profiler-4.4-linux-x64.tar.gz
          tar xf ap.tar.gz
          echo "$PWD/async-profiler-4.4-linux-x64/bin" >> $GITHUB_PATH
          sudo apt-get install -y librsvg2-bin
          curl -sO https://raw.githubusercontent.com/brendangregg/FlameGraph/master/flamegraph.pl

      - name: Run benchmark
        run: |
          ./gradlew :kmp:jvmTestProfile --rerun-tasks --no-daemon \
            -PapLib="$PWD/async-profiler-4.4-linux-x64/lib/libasyncProfiler.so"

      - name: Generate flamegraph PNGs
        if: always()
        run: |
          SHORT_SHA="${{ github.sha }}"
          SHORT_SHA="${SHORT_SHA:0:9}"

          ALLOC_COLLAPSED=kmp/build/reports/graph-load-alloc.collapsed
          if [ -f "$ALLOC_COLLAPSED" ]; then
            perl flamegraph.pl \
              --width 1800 \
              --title "Alloc flamegraph (${SHORT_SHA})" \
              --colors mem \
              "$ALLOC_COLLAPSED" > flamegraph-alloc.svg
            rsvg-convert -w 1800 flamegraph-alloc.svg -o flamegraph-alloc.png
            echo "ALLOC_PNG_GENERATED=true" >> $GITHUB_ENV
          else
            echo "ALLOC_PNG_GENERATED=false" >> $GITHUB_ENV
          fi

          CPU_COLLAPSED=kmp/build/reports/graph-load-cpu.collapsed
          if [ -f "$CPU_COLLAPSED" ]; then
            perl flamegraph.pl \
              --width 1800 \
              --title "CPU flamegraph (${SHORT_SHA})" \
              --colors java \
              "$CPU_COLLAPSED" > flamegraph-cpu.svg
            rsvg-convert -w 1800 flamegraph-cpu.svg -o flamegraph-cpu.png
            echo "CPU_PNG_GENERATED=true" >> $GITHUB_ENV
          else
            echo "CPU_PNG_GENERATED=false" >> $GITHUB_ENV
          fi

      - name: Upload flamegraph PNGs to GitHub
        if: github.event_name == 'pull_request'
        run: |
          upload_png() {
            local file="$1"
            local env_var="$2"
            if [ -f "$file" ]; then
              RESPONSE=$(curl -s \
                -X POST \
                -H "Authorization: Bearer ${{ github.token }}" \
                -H "Accept: application/vnd.github+json" \
                -F "data=@${file}" \
                "https://uploads.github.com/repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/assets")
              IMAGE_URL=$(echo "$RESPONSE" | jq -r '.url // empty')
              echo "${env_var}=${IMAGE_URL}" >> $GITHUB_ENV
            fi
          }
          upload_png flamegraph-alloc.png FLAMEGRAPH_ALLOC_URL
          upload_png flamegraph-cpu.png FLAMEGRAPH_CPU_URL

      - name: Upload alloc flamegraph
        uses: actions/upload-artifact@v7
        if: always() && env.ALLOC_PNG_GENERATED == 'true'
        with:
          name: flamegraph-alloc-${{ github.sha }}
          path: flamegraph-alloc.png
          retention-days: 30

      - name: Upload CPU flamegraph
        uses: actions/upload-artifact@v7
        if: always() && env.CPU_PNG_GENERATED == 'true'
        with:
          name: flamegraph-cpu-${{ github.sha }}
          path: flamegraph-cpu.png
          retention-days: 30

      - name: Upload profiling data
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: profiling-data-${{ github.sha }}
          path: |
            kmp/build/reports/graph-load-alloc.collapsed
            kmp/build/reports/graph-load-cpu.collapsed
            kmp/build/reports/flamegraph.html
            kmp/build/reports/benchmark-query-stats.json
            kmp/build/reports/graph-load-wall.jfr
            kmp/build/reports/graph-load.jfr
          retention-days: 30

      - name: Commit benchmark summary (main only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add benchmarks/history/
          git diff --cached --quiet && exit 0
          git commit -m "chore(bench): benchmark summary ${{ github.sha }}"
          for i in 1 2 3 4 5; do
            git push && break
            echo "Push attempt $i failed — rebasing and retrying..."
            git pull --rebase origin main
          done

      - name: Compare to baseline and post PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const histDir = 'benchmarks/history';
            if (!fs.existsSync(histDir)) { console.log('No benchmark history'); return; }

            const allFiles = fs.readdirSync(histDir).filter(f => f.endsWith('.json') && f !== '.gitkeep').sort();
            if (allFiles.length === 0) { console.log('No previous benchmarks'); return; }

            const sha = '${{ github.sha }}'.slice(0, 7);
            const newFile = allFiles.filter(f => f.includes(sha)).pop() || allFiles[allFiles.length - 1];
            const baseFile = allFiles.filter(f => !f.includes(sha)).pop();

            if (!baseFile) { console.log('No baseline to compare against'); return; }

            const curr = JSON.parse(fs.readFileSync(path.join(histDir, newFile)));
            const base = JSON.parse(fs.readFileSync(path.join(histDir, baseFile)));

            const delta = (a, b, lowerIsBetter = true, unit = 'ms') => {
              if (a == null || b == null || a < 0 || b < 0) return '';
              const d = a - b;
              if (d === 0) return `0 (0%)`;
              const sign = d > 0 ? '+' : '';
              const rounded = unit === 'ms' ? Math.round(d) : parseFloat(d.toFixed(2));
              const pct = b !== 0 ? ` (${sign}${Math.round((d / b) * 100)}%)` : '';
              const emoji = lowerIsBetter ? (d < 0 ? ' ✅' : ' ⚠️') : (d > 0 ? ' ✅' : ' ⚠️');
              return `${sign}${rounded}${unit}${pct}${emoji}`;
            };
            const fmtMs = v => (v == null || v < 0) ? 'n/a' : `${v}ms`;
            const fmtJ = v => (v === undefined || v == null || v < 0) ? 'n/a' : `${v}x`;

            const allocHotspots = (curr.allocHotspots || []).slice(0, 5)
              .map(h => `\`${h.pct}%\` ${h.frame}`)
              .join('\n');

            const cpuHotspots = (curr.cpuHotspots || []).slice(0, 5)
              .map(h => `\`${h.pct}%\` ${h.frame}`)
              .join('\n');

            const allocUrl = process.env.FLAMEGRAPH_ALLOC_URL || '';
            const cpuUrl = process.env.FLAMEGRAPH_CPU_URL || '';
            const allocSection = allocUrl
              ? `\n![Allocation flamegraph](${allocUrl})\n`
              : '\n_Alloc flamegraph not available_\n';
            const cpuSection = cpuUrl
              ? `\n![CPU flamegraph](${cpuUrl})\n`
              : '\n_CPU flamegraph not available_\n';

            const queryStats = curr.queryStats || [];
            const queryStatsRows = queryStats.slice(0, 15).map(q =>
              `| \`${q.table}:${q.op}\` | ${q.calls} | ${q.p50}ms | ${q.p99}ms | ${q.maxMs}ms | ${q.totalMs}ms |`
            ).join('\n');

            const body = [
              '## Benchmark Results',
              '',
              `Comparing \`${curr.gitSha}\` (this PR) vs \`${base.gitSha}\` (baseline)  `,
              `Graph config: \`${curr.graphConfig || 'SMALL'}\` — ${curr.pageCount || '?'} pages`,
              '',
              '| Metric | This PR | Baseline | Delta |',
              '|--------|---------|----------|-------|',
              `| Phase 1 TTI ↓ | ${fmtMs(curr.phase1TtiMs)} | ${fmtMs(base.phase1TtiMs)} | ${delta(curr.phase1TtiMs, base.phase1TtiMs)} |`,
              `| Phase 2 background ↓ | ${fmtMs(curr.phase2Ms)} | ${fmtMs(base.phase2Ms)} | ${delta(curr.phase2Ms, base.phase2Ms)} |`,
              `| Phase 3 index ↓ | ${fmtMs(curr.phase3Ms)} | ${fmtMs(base.phase3Ms)} | ${delta(curr.phase3Ms, base.phase3Ms)} |`,
              `| Total ↓ | ${fmtMs(curr.totalMs)} | ${fmtMs(base.totalMs)} | ${delta(curr.totalMs, base.totalMs)} |`,
              `| Write p95 (baseline) ↓ | ${fmtMs(curr.jankBaselineP95Ms)} | ${fmtMs(base.jankBaselineP95Ms)} | ${delta(curr.jankBaselineP95Ms, base.jankBaselineP95Ms)} |`,
              `| Write p95 (under load) ↓ | ${fmtMs(curr.jankLoadP95Ms)} | ${fmtMs(base.jankLoadP95Ms)} | ${delta(curr.jankLoadP95Ms, base.jankLoadP95Ms)} |`,
              `| Jank factor ↓ | ${fmtJ(curr.jankFactor)} | ${fmtJ(base.jankFactor)} | ${delta(curr.jankFactor, base.jankFactor, true, 'x')} |`,
              '_↓ lower is better_',
              '',
              '<details>',
              '<summary>Flamegraphs (this PR)</summary>',
              '',
              '**Allocation** — object allocation pressure (JDBC/SQLite churn)',
              allocSection,
              '**CPU** — method-level hotspots by on-CPU time',
              cpuSection,
              '</details>',
              '',
              queryStats.length > 0 ? '<details>' : '',
              queryStats.length > 0 ? '<summary>Top SQL queries by total time (this PR)</summary>' : '',
              queryStats.length > 0 ? '' : '',
              queryStats.length > 0 ? '| table:operation | calls | p50 | p99 | max | total |' : '',
              queryStats.length > 0 ? '|-----------------|-------|-----|-----|-----|-------|' : '',
              queryStatsRows,
              queryStats.length > 0 ? '' : '',
              queryStats.length > 0 ? '</details>' : '',
              '',
              '<details>',
              '<summary>Top allocation hotspots (this PR)</summary>',
              '',
              allocHotspots || '_No collapsed stacks available_',
              '',
              '</details>',
              '',
              '<details>',
              '<summary>Top CPU hotspots (this PR)</summary>',
              '',
              cpuHotspots || '_No collapsed stacks available_',
              '',
              '</details>',
            ].filter(line => line !== '').join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.user.login === 'github-actions[bot]' && c.body.includes('## Benchmark Results'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo, comment_id: existing.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, body,
              });
            }
