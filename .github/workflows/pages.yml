name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  # Called from release.yml after fdroid.yml uploads its artifact, so that the
  # Pages deploy picks up the fresh F-Droid index without a separate site build.
  workflow_call:

permissions:
  contents: read
  actions: read

jobs:
  check-changes:
    runs-on: ubuntu-latest
    outputs:
      kmp-changed: ${{ steps.filter.outputs.kmp }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history needed to diff against github.event.before on multi-commit pushes
      - name: Detect kmp/gradle changes
        id: filter
        # Use the full push range (github.event.before → HEAD) so multi-commit pushes
        # don't miss changes that landed in earlier commits of the same push.
        run: |
          # On workflow_call (release deploy), skip the expensive Wasm rebuild.
          # The release has already been tested; the last artifact is current enough.
          if [ "${{ github.event_name }}" = "workflow_call" ]; then
            echo "kmp=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          BEFORE="${{ github.event.before }}"
          # All-zeros SHA means initial branch push — assume kmp changed to be safe
          if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            echo "kmp=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if git diff --name-only "$BEFORE" HEAD | grep -qE '^(kmp/|gradle|build\.gradle|buildSrc/|settings\.gradle|e2e/)'; then
            echo "kmp=true" >> "$GITHUB_OUTPUT"
          else
            echo "kmp=false" >> "$GITHUB_OUTPUT"
          fi

  build-demo:
    runs-on: ubuntu-latest
    needs: check-changes
    # Only rebuild Wasm when app code or build files change; site-only edits skip this job
    if: |
      github.event_name == 'workflow_dispatch' ||
      needs.check-changes.outputs.kmp-changed == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v4
        with:
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}
      - name: Build wasmJs demo
        run: ./gradlew :kmp:wasmJsBrowserDistribution --no-daemon --build-cache -PenableJs=true
      - name: Assert expected output exists
        run: test -d kmp/build/dist/wasmJs/productionExecutable/
      - name: Assert no single file exceeds 90 MB
        run: |
          if find kmp/build/dist/wasmJs/productionExecutable -type f -size +90M | grep -q .; then
            find kmp/build/dist/wasmJs/productionExecutable -type f -size +90M -exec echo "FILE TOO LARGE: {}" \;
            exit 1
          fi
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: e2e/package-lock.json
      - name: Install Playwright Chromium
        run: cd e2e && npm ci && npx playwright install --with-deps chromium
      - name: Smoke-test WASM demo in headless Chromium
        run: cd e2e && npx playwright test
        env:
          DEMO_DIST: ../kmp/build/dist/wasmJs/productionExecutable
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7
      - uses: actions/upload-artifact@v4
        with:
          name: demo-dist
          path: kmp/build/dist/wasmJs/productionExecutable/
          retention-days: 90

  build-site:
    runs-on: ubuntu-latest
    needs: build-demo
    if: always() && (needs.build-demo.result == 'success' || needs.build-demo.result == 'skipped')
    steps:
      - uses: actions/checkout@v4

      # ── Demo artifact ─────────────────────────────────────────────────────
      # Try current run first (when build-demo ran); fall back to last successful run
      # so site-only edits keep the previously-built demo live.
      - id: download-demo
        name: Download demo artifact (current run)
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: demo-dist
          path: site/public/demo/
      - id: download-demo-fallback
        name: Download demo artifact (last successful run)
        if: steps.download-demo.outcome == 'failure'
        continue-on-error: true
        run: |
          # Iterate recent successful runs until we find one that has demo-dist.
          # build-demo is skipped on site-only pushes, so the very latest run may
          # not have the artifact — search up to 20 runs to find one that does.
          FOUND=false
          for RUN_ID in $(gh run list --workflow pages.yml --status success --limit 20 \
            --json databaseId --jq '.[].databaseId'); do
            if gh run download "$RUN_ID" --name demo-dist --dir site/public/demo/ 2>/dev/null; then
              echo "Downloaded demo-dist from run $RUN_ID"
              FOUND=true
              break
            fi
          done
          if [ "$FOUND" != "true" ]; then
            echo "No recent successful run with demo-dist found"
            exit 1
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      # ── F-Droid content ───────────────────────────────────────────────────
      # Primary: current run — present when fdroid.yml ran before us in the same
      # release.yml workflow (artifacts are shared across reusable workflow calls
      # within the same parent run).
      - id: download-fdroid
        name: Download fdroid content (current run)
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: fdroid-content
          path: fdroid-content/
      # Fallback: restore from the most recent successful fdroid.yml run.
      - id: download-fdroid-fallback
        name: Restore fdroid content (last successful fdroid run)
        if: steps.download-fdroid.outcome == 'failure'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          LAST_RUN=$(gh run list --workflow fdroid.yml --status success --limit 1 \
            --json databaseId --jq '.[0].databaseId // empty')
          if [ -n "$LAST_RUN" ]; then
            gh run download "$LAST_RUN" --name fdroid-content --dir fdroid-content/ || true
            # upload-artifact@v4 strips the common path prefix (fdroid/) when
            # multiple paths share it, so the artifact lands at repo/ not fdroid/repo/.
            [ -d fdroid-content/repo ] && \
              echo "Restored fdroid-content from run $LAST_RUN" || \
              echo "Download succeeded but repo/ missing in run $LAST_RUN"
          else
            echo "No previous successful fdroid run found; fdroid content will be absent"
          fi

      - uses: actions/configure-pages@v5
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: site/package-lock.json
      - name: Install site dependencies
        run: npm ci
        working-directory: site
      - name: Build Astro site
        run: npm run build
        working-directory: site
        env:
          # True when demo files are present from either current run or fallback
          DEMO_AVAILABLE: ${{ steps.download-demo.outcome == 'success' || steps.download-demo-fallback.outcome == 'success' }}

      - name: Merge fdroid content into site output
        run: |
          # upload-artifact@v4 strips the common fdroid/ prefix, so the artifact
          # structure is repo/ and archive/ directly (not fdroid/repo/).
          if [ -d fdroid-content/repo ]; then
            mkdir -p site/dist/fdroid
            cp -r fdroid-content/repo site/dist/fdroid/
            if [ -d fdroid-content/archive ]; then
              cp -r fdroid-content/archive site/dist/fdroid/
            fi
            echo "F-Droid content merged into site output"
          else
            echo "No fdroid content available; /fdroid/repo will be absent from the deploy"
          fi

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist/

  deploy:
    runs-on: ubuntu-latest
    needs: build-site
    # GitHub Actions skips jobs with default success() when any transitive dependency was
    # skipped (even via if:always() chains). Override explicitly to only gate on build-site.
    if: always() && needs.build-site.result == 'success'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
