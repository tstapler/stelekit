name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths-ignore:
      - 'CHANGELOG.md'
      - '.release-please-manifest.json'
      - 'Formula/**'
      - 'Casks/**'
  workflow_dispatch:
  # Called from release.yml after fdroid.yml uploads its artifact, so that the
  # Pages deploy picks up the fresh F-Droid index without a separate site build.
  workflow_call:
    inputs:
      force_demo_rebuild:
        type: boolean
        default: false
        description: 'Force Wasm rebuild even when kmp/ files did not change — pass true from release.yml so the app artifact is present in the run for build-site to download'

# Queue pages.yml runs rather than cancelling them. A fast CI-only push completing
# and deploying would otherwise cancel a concurrent workflow_dispatch run mid-way
# through the 15-minute build-demo job, meaning the demo never gets rebuilt.
# cancel-in-progress: false ensures the slower demo build always runs to completion.
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  actions: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check-changes:
    runs-on: ubuntu-latest
    outputs:
      kmp-changed: ${{ steps.filter.outputs.kmp }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history needed to diff against github.event.before on multi-commit pushes
      - name: Detect kmp/gradle changes
        id: filter
        # Use the full push range (github.event.before → HEAD) so multi-commit pushes
        # don't miss changes that landed in earlier commits of the same push.
        run: |
          # When called from release.yml with force_demo_rebuild=true, force the Wasm rebuild
          # even though release commits only bump version files (not kmp/ code).
          # github.event_name propagates the caller's trigger (push, not workflow_call),
          # so we use an explicit boolean input instead of inspecting event_name.
          if [ "${{ inputs.force_demo_rebuild }}" = "true" ]; then
            echo "kmp=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          BEFORE="${{ github.event.before }}"
          # All-zeros SHA means initial branch push — assume kmp changed to be safe
          if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            echo "kmp=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if git diff --name-only "$BEFORE" HEAD | grep -qE '^(kmp/|gradle|build\.gradle|buildSrc/|settings\.gradle|e2e/)'; then
            echo "kmp=true" >> "$GITHUB_OUTPUT"
          else
            echo "kmp=false" >> "$GITHUB_OUTPUT"
          fi

  build-demo:
    runs-on: ubuntu-latest
    needs: check-changes
    timeout-minutes: 30
    # Only rebuild Wasm when app code or build files change; site-only edits skip this job
    if: |
      github.event_name == 'workflow_dispatch' ||
      needs.check-changes.outputs.kmp-changed == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v4
        with:
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}
      - name: Cache Kotlin/Native compiler
        uses: actions/cache@v4
        with:
          path: ~/.konan
          key: konan-${{ runner.os }}-${{ hashFiles('kmp/build.gradle.kts', 'gradle/libs.versions.toml', 'settings.gradle.kts', 'gradle.properties') }}
      - name: Cache Wasm app distribution
        id: cache-demo
        uses: actions/cache@v4
        with:
          path: kmp/build/dist/wasmJs/productionExecutable/
          key: wasm-app-${{ runner.os }}-${{ hashFiles('kmp/build.gradle.kts', 'gradle/libs.versions.toml', 'settings.gradle.kts', 'gradle.properties', 'kmp/src/wasmJsMain/**', 'kmp/src/jsMain/**', 'kmp/src/commonMain/**') }}
          restore-keys: |
            wasm-app-${{ runner.os }}-
      - name: Build wasmJs demo
        if: steps.cache-demo.outputs.cache-hit != 'true'
        run: ./gradlew :kmp:wasmJsBrowserDistribution --no-daemon --build-cache -PenableJs=true
      - name: Assert expected output exists
        run: test -d kmp/build/dist/wasmJs/productionExecutable/
      - name: Assert no single file exceeds 90 MB
        run: |
          if find kmp/build/dist/wasmJs/productionExecutable -type f -size +90M | grep -q .; then
            find kmp/build/dist/wasmJs/productionExecutable -type f -size +90M -exec echo "FILE TOO LARGE: {}" \;
            exit 1
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: app-dist
          path: kmp/build/dist/wasmJs/productionExecutable/
          retention-days: 90

  build-site:
    runs-on: ubuntu-latest
    needs: build-demo
    if: always() && (needs.build-demo.result == 'success' || needs.build-demo.result == 'skipped')
    steps:
      - uses: actions/checkout@v4

      # ── Demo artifact ─────────────────────────────────────────────────────
      # Try current run first (when build-demo ran); fall back to the latest
      # app-dist artifact from any prior run so site-only edits (or pushes that
      # don't touch kmp/, which skip build-demo) keep the previously-built demo
      # live. Artifacts (90-day retention) are used instead of actions/cache —
      # the wasm-app cache entry was observed getting evicted under this repo's
      # cache pressure well within days, silently degrading the deployed site to
      # its "coming soon" placeholder with no CI failure. `gh run download`
      # without a run id fetches the most recent matching artifact across the
      # whole repo, mirroring the fdroid-content fallback below.
      - id: download-demo
        name: Download app artifact (current run)
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: app-dist
          path: site/public/app/
      - id: download-demo-fallback
        name: Download app artifact (latest available, fallback)
        if: steps.download-demo.outcome == 'failure'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh run download --name app-dist --dir site/public/app/
      # Fail loudly instead of silently deploying without a demo. The previous
      # design treated "no demo found" as a handled, non-erroring state — that's
      # exactly what let the cache-eviction bug above ship a "coming soon"
      # placeholder to production with fully green CI. Whatever future cause
      # might make BOTH downloads fail, it must block the deploy, not degrade
      # past it: the prior successful GitHub Pages deployment stays live when
      # this job fails, which is a strictly better outcome for users than
      # shipping a broken one.
      - name: Fail if no app-dist artifact is available from any source
        if: steps.download-demo.outcome == 'failure' && steps.download-demo-fallback.outcome == 'failure'
        run: |
          echo "::error::No app-dist artifact found (current run and latest-available fallback both failed). Refusing to deploy — this previously shipped a silent 'coming soon' regression to production. If this is genuinely the first-ever deploy with no prior artifact to fall back to, that's the one legitimate case for this failure; otherwise investigate why build-demo / artifact retention is broken."
          exit 1

      # ── F-Droid content ───────────────────────────────────────────────────
      # Primary: current run — present when fdroid.yml ran before us in the same
      # release.yml workflow (artifacts are shared across reusable workflow calls
      # within the same parent run).
      - id: download-fdroid
        name: Download fdroid content (current run)
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: fdroid-content
          path: fdroid-content/
      # Fallback: restore from the most recent successful fdroid.yml run.
      - id: download-fdroid-fallback
        name: Restore fdroid content (last successful fdroid run)
        if: steps.download-fdroid.outcome == 'failure'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          LAST_RUN=$(gh run list --workflow fdroid.yml --status success --limit 1 \
            --json databaseId --jq '.[0].databaseId // empty')
          if [ -n "$LAST_RUN" ]; then
            gh run download "$LAST_RUN" --name fdroid-content --dir fdroid-content/ || true
            # upload-artifact@v4 strips the common path prefix (fdroid/) when
            # multiple paths share it, so the artifact lands at repo/ not fdroid/repo/.
            [ -d fdroid-content/repo ] && \
              echo "Restored fdroid-content from run $LAST_RUN" || \
              echo "Download succeeded but repo/ missing in run $LAST_RUN"
          else
            echo "No previous successful fdroid run found; fdroid content will be absent"
          fi

      - uses: actions/configure-pages@v5
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: site/package-lock.json
      - name: Test service worker cache-validation logic
        run: node --test looks-like-app-shell.test.js
        working-directory: kmp/src/wasmJsMain/resources
      - name: Install site dependencies
        run: npm ci
        working-directory: site
      - name: Build Astro site
        run: npm run build
        working-directory: site
        env:
          # True when demo files are present from either current run or fallback
          DEMO_AVAILABLE: ${{ steps.download-demo.outcome == 'success' || steps.download-demo-fallback.outcome == 'success' }}

      - name: Merge fdroid content into site output
        run: |
          # fdroid-staging/ is uploaded by fdroid.yml with repo/ as a subdirectory.
          # After download to fdroid-content/, the structure is fdroid-content/repo/.
          # APKs are included — the 100 MB Git limit doesn't apply to Actions artifacts.
          if [ -d fdroid-content/repo ]; then
            mkdir -p site/dist/fdroid
            cp -r fdroid-content/repo site/dist/fdroid/
            echo "F-Droid content merged into site output"
          else
            echo "No fdroid content available; /fdroid/repo will be absent from the deploy"
          fi

      - name: Assert site output is within GitHub Pages 1 GB limit
        run: |
          SIZE=$(du -sb site/dist/ | cut -f1)
          LIMIT=$((900 * 1024 * 1024))  # 900 MB — 10% headroom under the 1 GB hard limit
          echo "Site output size: $(( SIZE / 1024 / 1024 )) MB"
          if [ "$SIZE" -gt "$LIMIT" ]; then
            echo "ERROR: site/dist/ is $(( SIZE / 1024 / 1024 )) MB, exceeds 900 MB safety limit."
            echo "Check for unexpected large files:"
            find site/dist/ -type f -size +10M | sort -k1 -rh | head -20
            exit 1
          fi

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist/

  deploy:
    runs-on: ubuntu-latest
    needs: build-site
    # GitHub Actions skips jobs with default success() when any transitive dependency was
    # skipped (even via if:always() chains). Override explicitly to only gate on build-site.
    if: always() && needs.build-site.result == 'success'
    # Cancel any in-progress Pages deployment so a new commit never waits behind a stale
    # one. Without this, two simultaneous workflow runs (e.g. push + release) cause the
    # second deploy to fail with "in progress deployment" instead of superseding it.
    concurrency:
      group: pages-deploy
      cancel-in-progress: true
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
