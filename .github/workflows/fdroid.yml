name: F-Droid Repo Update

on:
  # Trigger only when a release is actually published so we don't run on every
  # push to main. workflow_run fired on every Release workflow completion (most
  # of which just update the release PR without publishing), flooding the pages
  # concurrency queue and causing most runs to be cancelled.
  release:
    types: [published]
  workflow_dispatch:
  # Called directly from release.yml after the GitHub release is published,
  # because GITHUB_TOKEN-triggered events cannot fire other workflows.
  workflow_call:

concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write
  actions: read

jobs:
  update-fdroid:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'release' || github.event_name == 'workflow_call'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Install fdroidserver
        run: |
          sudo apt-get install -y python3-pip aapt zipalign
          pip3 install --user fdroidserver

      - name: Restore fdroid repo signing keystore
        env:
          FDROID_KEYSTORE_BASE64: ${{ secrets.FDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$FDROID_KEYSTORE_BASE64" | base64 -d > fdroid/keystore.p12

      - name: Append keystore credentials to fdroid config
        env:
          FDROID_KEY_PASS: ${{ secrets.FDROID_KEY_PASS }}
          FDROID_STORE_PASS: ${{ secrets.FDROID_STORE_PASS }}
        run: |
          cat >> fdroid/config.yml <<EOF
          keystore: keystore.p12
          keystorepass: ${FDROID_STORE_PASS}
          keypass: ${FDROID_KEY_PASS}
          EOF

      - name: Download signed APKs from all releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p fdroid/repo
          gh release list --limit 100 --json tagName --jq '.[].tagName' | while read -r tag; do
            gh release download "$tag" \
              --pattern "SteleKit-*-android.apk" \
              --dir fdroid/repo/ || true
          done

      - name: Seed repo icon
        run: |
          mkdir -p fdroid/repo/icons
          cp fdroid/icons/icon.png fdroid/repo/icons/icon.png

      - name: Generate fdroid index
        working-directory: fdroid
        run: fdroid update --create-metadata --verbose

      - name: Download last Wasm demo artifact
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          LAST_RUN=$(gh run list --workflow pages.yml --status success --limit 1 \
            --json databaseId --jq '.[0].databaseId // empty')
          if [ -n "$LAST_RUN" ]; then
            gh run download "$LAST_RUN" --name demo-dist --dir site/public/demo/ || true
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Build Astro site
        working-directory: site
        run: |
          npm ci
          # Expose the demo iframe only when the demo files were actually downloaded.
          DEMO_AVAILABLE=$(test -f public/demo/index.html && echo true || echo false)
          DEMO_AVAILABLE=$DEMO_AVAILABLE npm run build

      - name: Merge fdroid repo into site output
        run: |
          mkdir -p site/dist/fdroid
          cp -r fdroid/repo site/dist/fdroid/
          if [ -d fdroid/archive ]; then
            cp -r fdroid/archive site/dist/fdroid/
          fi

      - name: Upload fdroid content as artifact
        uses: actions/upload-artifact@v4
        with:
          name: fdroid-content
          path: |
            fdroid/repo
            fdroid/archive
          if-no-files-found: warn
          retention-days: 90

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
