name: F-Droid Repo Update

on:
  # Trigger after the Release workflow completes so all artifacts have been
  # uploaded to the GitHub release before we try to download them.
  workflow_run:
    workflows: ["Release"]
    types: [completed]
  workflow_dispatch:

# Share the pages concurrency group so this deploy doesn't collide with the
# normal site deploy triggered by pushes to main.
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write
  actions: read

jobs:
  update-fdroid:
    runs-on: ubuntu-latest
    # For workflow_run: only proceed when the Release workflow succeeded.
    # (Most pushes to main only update the release PR; only the PR-merge run
    # sets release_created=true and uploads artifacts.)
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Install fdroidserver
        run: |
          sudo apt-get install -y python3-pip aapt zipalign
          pip3 install --user fdroidserver

      - name: Restore fdroid repo signing keystore
        env:
          FDROID_KEYSTORE_BASE64: ${{ secrets.FDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$FDROID_KEYSTORE_BASE64" | base64 -d > fdroid/keystore.p12

      - name: Append keystore credentials to fdroid config
        env:
          FDROID_KEY_PASS: ${{ secrets.FDROID_KEY_PASS }}
          FDROID_STORE_PASS: ${{ secrets.FDROID_STORE_PASS }}
        run: |
          cat >> fdroid/config.yml <<EOF
          keystore: keystore.p12
          keystorepass: ${FDROID_STORE_PASS}
          keypass: ${FDROID_KEY_PASS}
          EOF

      - name: Resolve release tag
        id: tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.release.tag_name }}"
          if [ -z "$TAG" ]; then
            TAG=$(gh release list --limit 1 --json tagName --jq '.[0].tagName')
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Download signed APK from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p fdroid/repo
          gh release download "${{ steps.tag.outputs.tag }}" \
            --pattern "SteleKit-*-android.apk" \
            --dir fdroid/repo/

      - name: Generate fdroid index
        working-directory: fdroid
        run: fdroid update --create-metadata --verbose

      - name: Download last Wasm demo artifact
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          LAST_RUN=$(gh run list --workflow pages.yml --status success --limit 1 \
            --json databaseId --jq '.[0].databaseId // empty')
          if [ -n "$LAST_RUN" ]; then
            gh run download "$LAST_RUN" --name demo-dist --dir site/public/demo/ || true
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Build Astro site
        working-directory: site
        run: |
          npm ci
          npm run build

      - name: Merge fdroid repo into site output
        run: |
          mkdir -p site/dist/fdroid
          cp -r fdroid/repo site/dist/fdroid/
          if [ -d fdroid/archive ]; then
            cp -r fdroid/archive site/dist/fdroid/
          fi

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
