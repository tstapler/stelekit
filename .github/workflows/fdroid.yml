name: F-Droid Repo Update

on:
  # Direct trigger when a release is published. Note: GITHUB_TOKEN-triggered
  # release events cannot fire other workflows, so release.yml also calls this
  # directly via workflow_call after publishing.
  release:
    types: [published]
  workflow_dispatch:
  # Called from release.yml after the GitHub release is published.
  workflow_call:

concurrency:
  # fdroid-update is separate from the pages group because this workflow no
  # longer deploys to Pages — it only builds the index and uploads an artifact.
  # Keeping it in the pages group caused it to be cancelled by pages.yml pushes.
  group: fdroid-update
  cancel-in-progress: false

permissions:
  contents: read
  actions: read

jobs:
  update-fdroid:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Install fdroidserver
        run: |
          sudo apt-get install -y aapt zipalign
          # Ensure uv is available (pre-installed on ubuntu-latest; install via
          # pip3 as fallback if the runner image is older).
          command -v uv >/dev/null 2>&1 || pip3 install --user uv
          uv sync --directory fdroid

      - name: Patch fdroidserver for androguard 4.x compatibility
        # fdroidserver sets apkobject._v2_blocks = NoOverwriteDict() as a workaround
        # for androguard issue #1030. But androguard 4.x now calls _v2_blocks.append(),
        # which NoOverwriteDict (a dict subclass) doesn't support. Add append() so it
        # works as both a dict (fdroidserver's intent) and a list (androguard 4.x).
        # Tracked: https://gitlab.com/fdroid/fdroidserver/-/issues/1128
        run: |
          uv run --directory fdroid python3 - <<'PYEOF'
          import fdroidserver.common as m, os, sys
          path = os.path.abspath(m.__file__)
          src = open(path).read()
          OLD = '        def __setitem__(self, k, v):\n            if k not in self:\n                super().__setitem__(k, v)'
          # append() stores items at integer indices; __iter__ must yield values
          # (block objects) not keys (integers) so androguard 4.x can access .id
          NEW = OLD + (
              '\n        def append(self, item):\n            super().__setitem__(len(self), item)'
              '\n        def __iter__(self):\n            return iter(self.values())'
          )
          if NEW in src:
              print("Patch already applied")
          elif OLD in src:
              open(path, 'w').write(src.replace(OLD, NEW))
              print(f"Patched {path}")
          else:
              print("ERROR: patch target not found — fdroidserver may have changed", file=sys.stderr)
              sys.exit(1)
          PYEOF

      - name: Restore fdroid repo signing keystore
        env:
          FDROID_KEYSTORE_BASE64: ${{ secrets.FDROID_KEYSTORE_BASE64 }}
        run: |
          [ -n "$FDROID_KEYSTORE_BASE64" ] || { echo "FDROID_KEYSTORE_BASE64 is unset"; exit 1; }
          echo "$FDROID_KEYSTORE_BASE64" | base64 -d > /tmp/fdroid-keystore.p12
          [ -s /tmp/fdroid-keystore.p12 ] || { echo "Keystore decoded to empty file"; exit 1; }

      - name: Append keystore credentials to fdroid config
        env:
          FDROID_KEY_PASS: ${{ secrets.FDROID_KEY_PASS }}
          FDROID_STORE_PASS: ${{ secrets.FDROID_STORE_PASS }}
        run: |
          printf 'keystore: /tmp/fdroid-keystore.p12\nkeystorepass: %s\nkeypass: %s\n' \
            "$FDROID_STORE_PASS" "$FDROID_KEY_PASS" >> fdroid/config.yml

      - name: Download signed APKs from all releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p fdroid/repo
          DOWNLOADED=0
          while IFS= read -r tag; do
            if gh release download "$tag" \
              --pattern "SteleKit-*-android.apk" \
              --dir fdroid/repo/ 2>/dev/null; then
              DOWNLOADED=$((DOWNLOADED + 1))
            fi
          done < <(gh release list --limit 100 --json tagName --jq '.[].tagName')
          echo "Downloaded $DOWNLOADED APK(s)"
          [ "$DOWNLOADED" -gt 0 ] || { echo "No APKs downloaded — refusing to publish empty F-Droid repo"; exit 1; }

      - name: Remove APKs that androguard cannot parse
        # Some early APKs have resource tables that androguard rejects
        # (ResParserError: res1 must be zero!, KeyError: 'resources.arsc').
        # Pre-scan and remove them so fdroid update doesn't abort entirely.
        # Locally: uv run --directory fdroid python3 fdroid/scan_apks.py fdroid/repo/
        # Paths are relative to fdroid/ because --directory changes cwd there.
        run: uv run --directory fdroid python3 scan_apks.py repo/

      - name: Seed repo icon
        run: |
          mkdir -p fdroid/repo/icons
          cp fdroid/icons/icon.png fdroid/repo/icons/icon.png

      - name: Generate fdroid index
        run: uv run --directory fdroid fdroid update --create-metadata --verbose

      - name: Stage fdroid content for upload
        run: |
          # Using a staging directory preserves the repo/ directory structure in the
          # artifact. Without it, upload-artifact@v4 strips the fdroid/repo/ prefix and
          # the artifact lands flat (no repo/ subdirectory), breaking the pages.yml check.
          #
          # APKs are included: the 100 MB Git file limit does not apply to Actions-deployed
          # Pages artifacts. With archive_older:5, repo/ has at most 5 APKs (~500 MB total)
          # which fits under the 900 MB site safety limit.
          mkdir -p fdroid-staging/repo
          rsync -a fdroid/repo/ fdroid-staging/repo/

      - name: Upload fdroid content
        uses: actions/upload-artifact@v4
        with:
          name: fdroid-content
          # Uploads fdroid-staging/ → artifact has repo/ as a subdirectory.
          # pages.yml checks for fdroid-content/repo/ after download, which works correctly.
          path: fdroid-staging
          if-no-files-found: error
          retention-days: 90
      # Pages deployment is handled by pages.yml, which downloads this artifact
      # and assembles the full site in a single build+deploy step.
