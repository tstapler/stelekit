name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  checks: write
  contents: read

jobs:
  # ── JVM tests (shared + desktop logic) ────────────────────────────────────
  jvm-test:
    name: JVM Tests
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-home-cache-cleanup: true
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

      - name: Install Xvfb
        run: sudo apt-get install -y xvfb

      - name: Run JVM tests
        run: xvfb-run --auto-servernum ./gradlew :kmp:jvmTest --no-daemon --build-cache

      - name: Publish test report
        uses: mikepenz/action-junit-report@v4
        if: always()
        with:
          report_paths: '**/build/test-results/jvmTest/**/TEST-*.xml'
          fail_on_failure: true
          require_tests: true
          check_name: JVM Test Results

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jvm-test-results
          path: '**/build/test-results/jvmTest/**/*.xml'
          retention-days: 7

  # ── Android unit tests + debug APK ────────────────────────────────────────
  android:
    name: Android
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-home-cache-cleanup: true
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

      - name: Run Android unit tests
        run: ./gradlew :kmp:testDebugUnitTest --no-daemon --build-cache

      - name: Build debug APK
        run: ./gradlew :androidApp:assembleDebug --no-daemon --build-cache

      - name: Publish test report
        uses: mikepenz/action-junit-report@v4
        if: always()
        with:
          report_paths: '**/build/test-results/testDebugUnitTest/**/TEST-*.xml'
          fail_on_failure: true
          check_name: Android Test Results

      - uses: actions/upload-artifact@v4
        if: success()
        with:
          name: debug-apk
          path: androidApp/build/outputs/apk/debug/*.apk
          retention-days: 7

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: android-test-results
          path: '**/build/test-results/testDebugUnitTest/**/*.xml'
          retention-days: 7

  # ── JS / Web build ─────────────────────────────────────────────────────────
  web:
    name: Web (JS)
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-home-cache-cleanup: true
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

      - name: Build JS bundle
        run: ./gradlew :kmp:jsBrowserProductionWebpack --no-daemon --build-cache -PenableJs=true
