name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  checks: write
  contents: read

jobs:
  # ── JVM tests (shared + desktop logic) ────────────────────────────────────
  jvm-test:
    name: JVM Tests
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-home-cache-cleanup: true
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

      - name: Install Xvfb
        run: sudo apt-get install -y xvfb

      - name: Run JVM tests
        run: xvfb-run --auto-servernum ./gradlew :kmp:jvmTest --no-daemon --build-cache

      - name: Publish test report
        uses: mikepenz/action-junit-report@v4
        if: always()
        with:
          report_paths: '**/build/test-results/jvmTest/**/TEST-*.xml'
          fail_on_failure: true
          require_tests: true
          check_name: JVM Test Results

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jvm-test-results
          path: '**/build/test-results/jvmTest/**/*.xml'
          retention-days: 7

  # ── Android unit tests + debug APK ────────────────────────────────────────
  android:
    name: Android
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-home-cache-cleanup: true
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}
          # Exclude Kotlin IC state — stale metadata across branches causes spurious
          # expect/actual mismatch errors (e.g. PlatformSettings supertype mismatch).
          gradle-home-cache-excludes: caches/kotlin-build-*

      # Run tests, record screenshots, and assemble the APK in a single Gradle
      # invocation so configuration, compilation, and daemon startup happen once.
      # Goldens are intentionally not committed — rendering differs between machines.
      # To enable regression detection: download artifacts from a baseline CI run,
      # commit to kmp/src/androidUnitTest/snapshots/images/, then switch to verifyRoborazziDebug.
      - name: Run Android tests and build APK
        run: ./gradlew :kmp:testDebugUnitTest :kmp:recordRoborazziDebug :androidApp:assembleDebug --no-daemon --build-cache

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: roborazzi-screenshots
          path: kmp/src/androidUnitTest/snapshots/
          retention-days: 14

      - name: Publish test report
        uses: mikepenz/action-junit-report@v4
        if: always()
        with:
          report_paths: '**/build/test-results/testDebugUnitTest/**/TEST-*.xml'
          fail_on_failure: true
          check_name: Android Test Results

      - uses: actions/upload-artifact@v4
        if: success()
        with:
          name: debug-apk
          path: androidApp/build/outputs/apk/debug/*.apk
          retention-days: 7

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: android-test-results
          path: '**/build/test-results/testDebugUnitTest/**/*.xml'
          retention-days: 7

  # ── README sync check ─────────────────────────────────────────────────────
  readme-sync:
    name: README sync
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      - uses: actions/checkout@v4

      - name: Regenerate README and check for drift
        run: |
          bash scripts/generate-readme.sh
          if ! git diff --exit-code README.md; then
            echo ""
            echo "README.md is out of sync with docs/install.md."
            echo "Run './scripts/generate-readme.sh' and commit the result."
            exit 1
          fi

  # ── Detekt static analysis ────────────────────────────────────────────────
  lint:
    name: Lint (Detekt)
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-home-cache-cleanup: true
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

      - name: Run Detekt
        run: ./gradlew :kmp:detekt --no-daemon --build-cache

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: detekt-report
          path: kmp/build/reports/detekt/
          retention-days: 7

  # ── Android emulator smoke tests ─────────────────────────────────────────
  android-smoke:
    name: Android Smoke Tests (Emulator)
    runs-on: ubuntu-latest
    needs: [android]
    if: github.event.pull_request.draft == false

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Enable KVM for hardware acceleration
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-home-cache-cleanup: true
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}
          gradle-home-cache-excludes: caches/kotlin-build-*

      - name: Run smoke tests on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          target: default
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -memory 2048
          disable-animations: true
          script: ./gradlew :androidApp:connectedDebugAndroidTest --no-daemon --build-cache

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: smoke-test-results
          path: androidApp/build/reports/androidTests/connected/
          retention-days: 14

      - name: Publish smoke test report
        uses: mikepenz/action-junit-report@v4
        if: always()
        with:
          report_paths: 'androidApp/build/outputs/androidTest-results/connected/**/*.xml'
          fail_on_failure: true
          check_name: Android Smoke Test Results

  # ── Wasm/JS compile check ─────────────────────────────────────────────────
  wasmjs-compile:
    name: Wasm/JS Compile
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-home-cache-cleanup: true
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

      - name: Compile wasmJs target
        run: ./gradlew :kmp:compileKotlinWasmJs --no-daemon --build-cache -PenableJs=true
