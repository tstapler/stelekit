name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  checks: write
  contents: read

jobs:
  # ── JVM tests (shared + desktop logic) ────────────────────────────────────
  jvm-test:
    name: JVM Tests
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-home-cache-cleanup: true
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

      - name: Install Xvfb
        run: sudo apt-get install -y xvfb

      - name: Run JVM tests
        run: xvfb-run --auto-servernum ./gradlew :kmp:jvmTest --no-daemon --build-cache

      - name: Publish test report
        uses: mikepenz/action-junit-report@v4
        if: always()
        with:
          report_paths: '**/build/test-results/jvmTest/**/TEST-*.xml'
          fail_on_failure: true
          require_tests: true
          check_name: JVM Test Results

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jvm-test-results
          path: '**/build/test-results/jvmTest/**/*.xml'
          retention-days: 7

  # ── Android unit tests + debug APK ────────────────────────────────────────
  android:
    name: Android
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-home-cache-cleanup: true
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

      - name: Run Android unit tests
        run: ./gradlew :kmp:testDebugUnitTest --no-daemon --build-cache

      - name: Verify Roborazzi screenshots
        run: ./gradlew :kmp:verifyRoborazziDebug --no-daemon --build-cache

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: roborazzi-diffs
          path: kmp/src/androidUnitTest/snapshots/compare/
          retention-days: 7

      - name: Build debug APK
        run: ./gradlew :androidApp:assembleDebug --no-daemon --build-cache

      - name: Publish test report
        uses: mikepenz/action-junit-report@v4
        if: always()
        with:
          report_paths: '**/build/test-results/testDebugUnitTest/**/TEST-*.xml'
          fail_on_failure: true
          check_name: Android Test Results

      - uses: actions/upload-artifact@v4
        if: success()
        with:
          name: debug-apk
          path: androidApp/build/outputs/apk/debug/*.apk
          retention-days: 7

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: android-test-results
          path: '**/build/test-results/testDebugUnitTest/**/*.xml'
          retention-days: 7

  # ── README sync check ─────────────────────────────────────────────────────
  readme-sync:
    name: README sync
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      - uses: actions/checkout@v4

      - name: Regenerate README and check for drift
        run: |
          bash scripts/generate-readme.sh
          if ! git diff --exit-code README.md; then
            echo ""
            echo "README.md is out of sync with docs/install.md."
            echo "Run './scripts/generate-readme.sh' and commit the result."
            exit 1
          fi

  # ── Detekt static analysis ────────────────────────────────────────────────
  lint:
    name: Lint (Detekt)
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-home-cache-cleanup: true
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

      - name: Run Detekt
        run: ./gradlew :kmp:detekt --no-daemon --build-cache

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: detekt-report
          path: kmp/build/reports/detekt/
          retention-days: 7

  # JS / Web build is disabled in CI — the JS target compiles conditionally
  # (enableJs=true) but commonMain currently uses JVM-only APIs that don't
  # compile for Kotlin/JS. Re-enable once the target is multiplatform-clean.
