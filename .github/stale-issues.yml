# This workflow warns and then closes issues that have had no activity for a
# specified amount of time. You can adjust the behavior by modifying this file.
# For more information, see:
#   https://github.com/marketplace/actions/close-stale-issues
#   https://github.com/actions/stale/blob/master/action.yml
#   https://github.com/actions/stale
---
name: 'Stale Issues Policy'
on:  # yamllint disable-line rule:truthy
  schedule:
    - cron: '0 0 * * *'  # Run at 00:00 UTC every day
  workflow_dispatch:

permissions:
  contents: read
  issues: write  # for actions/stale to close stale issues

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - name: '🧹 Mark & close stale issues'
        id: stale_issues
        uses: actions/stale@6f05e4244c9a0b2ed3401882b05d701dd0a7289b  # v7
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          days-before-issue-stale: 180
          days-before-close: 20
          operations-per-run: 100  # max num of ops per run
          stale-issue-label: ':status/automatic-stale'
          close-issue-label: ':status/automatic-closing'
          # trunk-ignore(yamllint/line-length)
          exempt-issue-labels: ':status/hold, :status/WIP, :type/enhancement, type/can-be-reproduced, priority-A'
          remove-stale-when-updated: true
          stale-issue-message: |
            Hi there! 👋

            This issue hasn't seen any activity in a while. We want to make sure it's still relevant — if you're still experiencing the problem, please add a comment to keep it open. Checking whether you're on the latest version of SteleKit is a good first step.

            If the issue has been resolved or is no longer relevant, no action is needed — we'll close it automatically in 20 days to keep the backlog tidy.

            Thanks for contributing to SteleKit! You can also open a [discussion](../../discussions) for questions or feature ideas.

      - name: 'Print outputs'
        run: |
          for key in steps.stale_issues.outputs
            do
              printf '%s: %s\n' "${key}" "${steps.stale_issues.outputs[key]}"
            done

      - name: '🧹 Close stale awaiting response issues'
        id: awaiting_issues
        uses: actions/stale@6f05e4244c9a0b2ed3401882b05d701dd0a7289b  # v7
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          days-before-issue-stale: 40
          days-before-close: 20
          operations-per-run: 30  # max num of ops per run
          stale-issue-label: ':status/automatic-stale'
          close-issue-label: ':status/automatic-closing'
          only-labels: 'awaiting response'
          remove-stale-when-updated: true
          stale-issue-message: |
            Hi there! 👋

            We're waiting on additional information for this issue and haven't heard back in a while. If you're still experiencing the problem, please add a comment with the requested details and we'll pick it up again.

            This issue will be closed automatically in 20 days if there is no further activity. Thanks for contributing to SteleKit!

      - name: 'Print outputs'
        run: |
          for key in steps.awaiting_issues.outputs
            do
              printf '%s: %s\n' "${key}" "${steps.awaiting_issues.outputs[key]}"
            done
